<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Financeiro Sanzio</title>
<meta name="theme-color" content="#0a0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0e1a;--bg2:#141926;--bg3:#1e2536;--bg4:#2a3148;
  --text:#e8ecf4;--text2:#7a8599;--text3:#4a5568;
  --accent:#6c9fff;--green:#5de8a0;--red:#ff6b7a;
  --orange:#ffb347;--purple:#b18cff;--pink:#ff7eb3;
  --cyan:#5ce0d8;--yellow:#ffe066;
  --radius:14px;--rs:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:76px;-webkit-font-smoothing:antialiased}
.ld{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s}
.ld.ok{opacity:0;pointer-events:none}
.sp{width:36px;height:36px;border:3px solid var(--bg3);border-top-color:var(--accent);border-radius:50%;animation:s .7s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}
.hd{padding:16px 16px 8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.hd h1{font-size:17px;font-weight:700;display:flex;align-items:center;gap:6px}
.hd-r{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.sl{background:var(--bg2);border:1px solid var(--bg3);color:var(--text);padding:6px 8px;border-radius:var(--rs);font-family:inherit;font-size:11px;cursor:pointer;outline:none;max-width:130px}
.sl:focus{border-color:var(--accent)}
.chs{display:flex;gap:5px;overflow-x:auto;padding:0 16px 10px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chs::-webkit-scrollbar{display:none}
.ch{background:var(--bg2);border:1px solid var(--bg3);color:var(--text2);padding:4px 10px;border-radius:18px;font-size:10px;font-family:inherit;white-space:nowrap;cursor:pointer;transition:all .2s}
.ch.on{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:600}
.kps{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:0 16px 12px}
.kp{background:var(--bg2);border-radius:var(--radius);padding:11px 12px;position:relative;overflow:hidden;border:1px solid var(--bg3)}
.kp::after{content:'';position:absolute;top:0;left:0;width:3px;height:100%}
.kp.tr::after{background:var(--green)}.kp.td::after{background:var(--red)}
.kp.tf::after{background:var(--orange)}.kp.ts::after{background:var(--accent)}
.kl{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.kv{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600}
.ks{font-size:9px;color:var(--text2);margin-top:1px;font-family:'JetBrains Mono',monospace}
.kp.fl{grid-column:1/-1}
.ps{color:var(--green)}.ng{color:var(--red)}.lr{color:var(--orange)}.az{color:var(--accent)}.rx{color:var(--purple)}
.sc{padding:0 16px 12px}
.st{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;display:flex;align-items:center;gap:5px}
.cb{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius);padding:12px;margin-bottom:8px}
.cb h3{font-size:11px;color:var(--text2);margin-bottom:8px}
.cw{position:relative;height:190px}
.tl{display:flex;flex-direction:column;gap:4px}
.tx{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--rs);padding:9px 11px;display:flex;align-items:center;gap:9px}
.ti{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.tn{flex:1;min-width:0}
.tnm{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tmt{font-size:9px;color:var(--text2);margin-top:1px}
.tv{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;text-align:right;flex-shrink:0}
.tv.d{color:var(--red)}.tv.r{color:var(--green)}
.bd{display:inline-block;font-size:7px;padding:1px 4px;border-radius:3px;font-weight:700;margin-left:2px;vertical-align:middle}
.bd.fx{background:rgba(255,179,71,.15);color:var(--orange)}
.bd.em{background:rgba(108,159,255,.15);color:var(--accent)}
.fi{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--rs);padding:9px 11px;display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.fl2{display:flex;align-items:center;gap:9px}
.fd{width:8px;height:8px;border-radius:50%}
.fd.ok{background:var(--green)}.fd.pd{background:var(--red);animation:bk 2s infinite}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.3}}
.fnm{font-size:11px;font-weight:500}
.fct{font-size:9px;color:var(--text2)}
.fv{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--orange)}
.cr{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--rs);padding:9px 11px;margin-bottom:4px;cursor:pointer;transition:background .15s}
.cr:hover{background:var(--bg3)}
.ct{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.cn{font-size:11px;font-weight:500;display:flex;align-items:center;gap:5px}
.cd{width:6px;height:6px;border-radius:50%}
.cvl{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600}
.cbar{height:3px;background:var(--bg4);border-radius:3px;overflow:hidden}
.cfill{height:100%;border-radius:3px;transition:width .5s}
.cp{font-size:9px;color:var(--text2);margin-top:2px}
.ag{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.mc{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--rs);padding:8px;text-align:center;cursor:pointer;transition:all .15s}
.mc:hover{border-color:var(--bg4)}.mc.at{border-color:var(--accent)}
.ml{font-size:10px;color:var(--text2);margin-bottom:2px}
.md{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--red)}
.mr{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--green)}
.ms{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;margin-top:1px}
.sb{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--rs);padding:8px 11px;color:var(--text);font-family:inherit;font-size:12px;width:100%;margin-bottom:8px;outline:none}
.sb:focus{border-color:var(--accent)}.sb::placeholder{color:var(--text3)}
.bn{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--bg3);display:flex;justify-content:space-around;align-items:center;padding:5px 0 max(5px,env(safe-area-inset-bottom));z-index:100}
.nv{display:flex;flex-direction:column;align-items:center;gap:1px;font-size:8px;color:var(--text3);cursor:pointer;padding:3px 6px;background:none;border:none;font-family:inherit;transition:color .2s}
.nv.on{color:var(--accent)}
.nv .ni{font-size:17px}
.pg{display:none}.pg.on{display:block}
.ey{text-align:center;padding:24px;color:var(--text2)}.ey .ei{font-size:36px;margin-bottom:6px}.ey p{font-size:12px}
.fc{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--bg4);border-radius:var(--radius);padding:12px;margin-bottom:8px}
.fc-t{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.fc-r{display:flex;justify-content:space-between;align-items:center;padding:2px 0;font-size:11px}
.fc-r .lb{color:var(--text2)}.fc-r .vl{font-family:'JetBrains Mono',monospace;font-weight:600}
.fc-d{height:1px;background:var(--bg4);margin:5px 0}
</style>
</head>
<body>
<div class="ld" id="ld"><div class="sp"></div></div>

<!-- DASHBOARD -->
<div class="pg on" id="pgD">
  <div class="hd">
    <h1><span style="font-size:20px">💰</span>Financeiro</h1>
    <div class="hd-r">
      <select class="sl" id="sC" onchange="af()"></select>
      <select class="sl" id="sM" onchange="af()"></select>
    </div>
  </div>
  <div class="kps">
    <div class="kp tr"><div class="kl">Receitas</div><div class="kv ps" id="kR">R$ 0</div></div>
    <div class="kp td"><div class="kl">Despesas</div><div class="kv ng" id="kD">R$ 0</div></div>
    <div class="kp tf"><div class="kl">Fixas do Mês</div><div class="kv lr" id="kF">R$ 0</div><div class="ks" id="kFs"></div></div>
    <div class="kp ts"><div class="kl">Saldo</div><div class="kv" id="kS">R$ 0</div></div>
  </div>
  <div class="sc"><div class="fc" id="fcC"></div></div>
  <div class="sc">
    <div class="cb"><h3>Despesas por Categoria</h3><div class="cw"><canvas id="c1"></canvas></div></div>
    <div class="cb"><h3>Evolução Diária</h3><div class="cw"><canvas id="c2"></canvas></div></div>
  </div>
  <div class="sc"><div class="st">📋 Últimos Lançamentos</div><div class="tl" id="tU"></div></div>
</div>

<!-- LANÇAMENTOS -->
<div class="pg" id="pgL">
  <div class="hd">
    <h1>📋 Lançamentos</h1>
    <div class="hd-r">
      <select class="sl sM2" onchange="sn(this)"></select>
      <select class="sl sC2" onchange="sn(this)"></select>
    </div>
  </div>
  <div class="sc">
    <input type="text" class="sb" id="sL" placeholder="Buscar..." oninput="rL()">
    <div class="chs" id="chL"></div>
    <div class="tl" id="lL"></div>
  </div>
</div>

<!-- FIXAS -->
<div class="pg" id="pgF">
  <div class="hd"><h1>📌 Despesas Fixas</h1></div>
  <div class="sc">
    <div class="kps" style="padding:0 0 10px">
      <div class="kp tf fl"><div class="kl">Total Fixas Mensal</div><div class="kv lr" id="kFT">R$ 0</div></div>
    </div>
    <div id="lF"></div>
  </div>
</div>

<!-- CATEGORIAS -->
<div class="pg" id="pgC">
  <div class="hd">
    <h1>🏷️ Categorias</h1>
    <div class="hd-r">
      <select class="sl sM2" onchange="sn(this)"></select>
      <select class="sl sC2" onchange="sn(this)"></select>
    </div>
  </div>
  <div class="sc">
    <div class="chs" id="chC"></div>
    <div id="lC"></div>
  </div>
</div>

<!-- ANUAL -->
<div class="pg" id="pgA">
  <div class="hd"><h1>📈 Visão Anual</h1></div>
  <div class="sc">
    <div class="cb"><h3>Receitas vs Despesas</h3><div class="cw" style="height:220px"><canvas id="c3"></canvas></div></div>
    <div class="ag" id="gA"></div>
  </div>
</div>

<!-- NAV -->
<nav class="bn">
  <button class="nv on" onclick="go('pgD',this)"><span class="ni">📊</span>Dashboard</button>
  <button class="nv" onclick="go('pgL',this)"><span class="ni">📋</span>Lançamentos</button>
  <button class="nv" onclick="go('pgF',this)"><span class="ni">📌</span>Fixas</button>
  <button class="nv" onclick="go('pgC',this)"><span class="ni">🏷️</span>Categorias</button>
  <button class="nv" onclick="go('pgA',this)"><span class="ni">📈</span>Anual</button>
</nav>

<script>
const SU='https://wqajkohquvoukljpkqet.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndxYWprb2hxdXZvdWtsanBrcWV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzIzNjIsImV4cCI6MjA4ODE0ODM2Mn0.-GsT75uLNZJJuFErpYjvOZ0lNJWlrg2qHpNUhGqUgus';
const MN=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const IC={'Moradia':'🏠','Mercado':'🛒','Transporte/Gasolina':'⛽','Lazer':'🎉','Assinaturas':'📺','Saúde e Beleza':'💊','Autoaperfeiçoamento':'📚','Folha de Pagamento':'👷','Despesas eventuais':'💸','Receita':'💵'};

let T=[],CO=[],CA=[];
let mA=new Date().getMonth(), aA=2026, cA='todas', fCL='todas', fCC='todas';
let ch1=null,ch2=null,ch3=null;

async function ap(t,q=''){
  try{const r=await fetch(`${SU}/rest/v1/${t}?${q}`,{headers:{'apikey':SK,'Authorization':`Bearer ${SK}`,'Content-Type':'application/json'}});if(!r.ok)throw new Error(r.status);return await r.json();}catch(e){console.error(t,e);return[];}
}

async function init(){
  CO=await ap('contas_bancarias','order=nome.asc');
  CA=await ap('categorias_financeiras','order=nome.asc');
  T=await ap('lancamentos',`select=*,categorias_financeiras(nome,cor_hex,tipo),contas_bancarias(nome,tipo)&data_vencimento=gte.${aA}-01-01&data_vencimento=lte.${aA}-12-31&order=data_vencimento.desc`);
  bS();af();rFx();rAn();
  document.getElementById('ld').classList.add('ok');
}

function bS(){
  // Mes
  document.querySelectorAll('.sM2,#sM').forEach(s=>{
    s.innerHTML='';
    MN.forEach((m,i)=>{const o=document.createElement('option');o.value=i;o.textContent=m.substring(0,3)+'/'+aA;if(i===mA)o.selected=true;s.appendChild(o);});
  });
  // Conta
  document.querySelectorAll('.sC2,#sC').forEach(s=>{
    s.innerHTML='<option value="todas">Todas contas</option>';
    CO.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.nome+(c.tipo==='empresarial'?' 🏢':'');s.appendChild(o);});
  });
}

function sn(el){
  if(el.classList.contains('sM2')){mA=parseInt(el.value);document.querySelectorAll('.sM2,#sM').forEach(s=>s.value=mA);}
  if(el.classList.contains('sC2')){cA=el.value;document.querySelectorAll('.sC2,#sC').forEach(s=>s.value=cA);}
  af();
}

function af(){
  mA=parseInt(document.getElementById('sM').value);
  cA=document.getElementById('sC').value;
  document.querySelectorAll('.sM2').forEach(s=>s.value=mA);
  document.querySelectorAll('.sC2').forEach(s=>s.value=cA);
  rD();rL();rCP();
}

function fmt(v){return'R$ '+Math.abs(Number(v)||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fd(d){if(!d)return'';const p=d.split('-');return p[2]+'/'+p[1];}
function fl(m,c){
  const mm=String(m+1).padStart(2,'0');
  let f=T.filter(l=>l.data_vencimento&&l.data_vencimento.startsWith(`${aA}-${mm}`));
  if(c&&c!=='todas')f=f.filter(l=>l.conta_id===c);
  return f;
}
function gCN(l){return l.contas_bancarias?l.contas_bancarias.nome:'';}
function gCa(l){return l.categorias_financeiras?l.categorias_financeiras.nome:'Outros';}
function gCo(l){return l.categorias_financeiras?l.categorias_financeiras.cor_hex:'#64748b';}

function txH(l){
  const cat=gCa(l),ic=IC[cat]||'💳',isD=l.tipo==='despesa',cn=gCN(l);
  const b=(l.recorrente?'<span class="bd fx">FIXA</span>':'')+(cn&&cn!=='C6 Bank'?`<span class="bd em">${cn}</span>`:'');
  return`<div class="tx"><div class="ti" style="background:${isD?'rgba(255,107,122,.12)':'rgba(93,232,160,.12)'}">${ic}</div><div class="tn"><div class="tnm">${l.descricao}${b}</div><div class="tmt">${fd(l.data_vencimento)} · ${cat} · ${l.forma_pagamento||''}</div></div><div class="tv ${isD?'d':'r'}">${isD?'-':'+'}${fmt(l.valor)}</div></div>`;
}

// DASHBOARD
function rD(){
  const d=fl(mA,cA),dp=d.filter(l=>l.tipo==='despesa'),rc=d.filter(l=>l.tipo==='receita'),fx=dp.filter(l=>l.recorrente===true);
  const tD=dp.reduce((s,l)=>s+Number(l.valor),0),tR=rc.reduce((s,l)=>s+Number(l.valor),0),tF=fx.reduce((s,l)=>s+Number(l.valor),0),sl=tR-tD;
  document.getElementById('kR').textContent=fmt(tR);
  document.getElementById('kD').textContent=fmt(tD);
  document.getElementById('kF').textContent=fmt(tF);
  document.getElementById('kFs').textContent=fx.length+' fixas pagas';
  const ks=document.getElementById('kS');
  ks.textContent=(sl>=0?'+':'-')+' '+fmt(sl);ks.className='kv '+(sl>=0?'ps':'ng');
  rFC(tR,tD,tF,dp);rC1(dp);rC2(dp);
  const u=d.slice(0,10),el=document.getElementById('tU');
  if(!u.length){el.innerHTML='<div class="ey"><div class="ei">📭</div><p>Sem lançamentos</p></div>';return;}
  el.innerHTML=u.map(txH).join('');
}

// FORECAST
function rFC(tR,tD,tF,dp){
  const hj=new Date(),da=hj.getMonth()===mA?hj.getDate():new Date(aA,mA+1,0).getDate();
  const dM=new Date(aA,mA+1,0).getDate(),dP=Math.min(da,dM);
  const dV=dp.filter(l=>!l.recorrente).reduce((s,l)=>s+Number(l.valor),0);
  const md=dP>0?dV/dP:0,dR=dM-dP;
  // Fixas referência
  const fr={};T.filter(l=>l.recorrente&&l.tipo==='despesa').forEach(l=>{if(!fr[l.descricao]||Number(l.valor)>Number(fr[l.descricao]))fr[l.descricao]=l.valor;});
  const tFR=Object.values(fr).reduce((s,v)=>s+Number(v),0);
  const pD=tFR+dV+(md*dR),pS=tR-pD;
  document.getElementById('fcC').innerHTML=`
    <div class="fc-t">🔮 Previsão ${MN[mA]}</div>
    <div class="fc-r"><span class="lb">Fixas previstas</span><span class="vl lr">${fmt(tFR)}</span></div>
    <div class="fc-r"><span class="lb">Variáveis até agora</span><span class="vl ng">${fmt(dV)}</span></div>
    <div class="fc-r"><span class="lb">Média diária</span><span class="vl" style="color:var(--text2)">${fmt(md)}/dia</span></div>
    <div class="fc-r"><span class="lb">Projeção +${dR} dias</span><span class="vl ng">${fmt(md*dR)}</span></div>
    <div class="fc-d"></div>
    <div class="fc-r"><span class="lb" style="font-weight:600;color:var(--text)">Despesa projetada</span><span class="vl ng" style="font-size:13px">${fmt(pD)}</span></div>
    <div class="fc-r"><span class="lb" style="font-weight:600;color:var(--text)">Saldo projetado</span><span class="vl ${pS>=0?'ps':'ng'}" style="font-size:13px">${pS>=0?'+':''}${fmt(pS)}</span></div>`;
}

// CHARTS
function rC1(dp){
  const g={};dp.forEach(l=>{const c=gCa(l),co=gCo(l);if(!g[c])g[c]={t:0,co};g[c].t+=Number(l.valor);});
  const lb=Object.keys(g),vl=lb.map(k=>g[k].t),cl=lb.map(k=>g[k].co);
  if(ch1)ch1.destroy();
  ch1=new Chart(document.getElementById('c1'),{type:'doughnut',data:{labels:lb,datasets:[{data:vl,backgroundColor:cl,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{position:'right',labels:{color:'#7a8599',font:{size:9},boxWidth:9,padding:5}}}}});
}
function rC2(dp){
  const g={};dp.forEach(l=>{const d=l.data_vencimento?l.data_vencimento.split('-')[2]:'01';g[d]=(g[d]||0)+Number(l.valor);});
  const d=Object.keys(g).sort(),v=d.map(k=>g[k]);
  if(ch2)ch2.destroy();
  ch2=new Chart(document.getElementById('c2'),{type:'bar',data:{labels:d.map(x=>x+'/'+String(mA+1).padStart(2,'0')),datasets:[{data:v,backgroundColor:'rgba(255,107,122,.5)',borderRadius:4,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#4a5568',font:{size:8}},grid:{display:false}},y:{ticks:{color:'#4a5568',font:{size:8},callback:v=>'R$'+v},grid:{color:'rgba(100,116,139,.08)'}}}}});
}

// LANÇAMENTOS
function rL(){
  const d=fl(mA,cA),src=(document.getElementById('sL')?.value||'').toLowerCase();
  const cu=[...new Set(d.map(gCa))].sort();
  document.getElementById('chL').innerHTML=`<button class="ch ${fCL==='todas'?'on':''}" onclick="fCL='todas';rL()">Todas</button>`+cu.map(c=>`<button class="ch ${fCL===c?'on':''}" onclick="fCL='${c.replace(/'/g,"\\'")}';rL()">${c}</button>`).join('');
  let f=d;
  if(fCL!=='todas')f=f.filter(l=>gCa(l)===fCL);
  if(src)f=f.filter(l=>l.descricao.toLowerCase().includes(src)||(l.favorecido_pagador||'').toLowerCase().includes(src));
  const el=document.getElementById('lL');
  if(!f.length){el.innerHTML='<div class="ey"><div class="ei">🔍</div><p>Nenhum encontrado</p></div>';return;}
  el.innerHTML=f.map(txH).join('');
}

// FIXAS
function rFx(){
  const fx=T.filter(l=>l.recorrente&&l.tipo==='despesa');
  const g={};fx.forEach(l=>{const k=l.descricao;if(!g[k]||l.data_vencimento>g[k].data_vencimento)g[k]=l;});
  const ls=Object.values(g).sort((a,b)=>Number(b.valor)-Number(a.valor));
  const tt=ls.reduce((s,l)=>s+Number(l.valor),0);
  document.getElementById('kFT').textContent=fmt(tt);
  const el=document.getElementById('lF');
  if(!ls.length){el.innerHTML='<div class="ey"><div class="ei">📌</div><p>Nenhuma fixa</p></div>';return;}
  el.innerHTML=ls.map(l=>{
    const ct=gCa(l),pg=(l.status||'').toLowerCase()==='pago',cn=gCN(l);
    return`<div class="fi"><div class="fl2"><div class="fd ${pg?'ok':'pd'}"></div><div><div class="fnm">${l.descricao}${cn&&cn!=='C6 Bank'?` <span class="bd em">${cn}</span>`:''}</div><div class="fct">${ct} · ${pg?'✅ Pago':'⏳ Pendente'}</div></div></div><div class="fv">${fmt(l.valor)}</div></div>`;
  }).join('');
}

// CATEGORIAS
function rCP(){
  const d=fl(mA,cA),dp=d.filter(l=>l.tipo==='despesa'),tD=dp.reduce((s,l)=>s+Number(l.valor),0);
  const g={};dp.forEach(l=>{const c=gCa(l),co=gCo(l);if(!g[c])g[c]={t:0,co,q:0,it:[]};g[c].t+=Number(l.valor);g[c].q++;g[c].it.push(l);});
  const so=Object.entries(g).sort((a,b)=>b[1].t-a[1].t);
  const chE=document.getElementById('chC');
  chE.innerHTML=`<button class="ch ${fCC==='todas'?'on':''}" onclick="fCC='todas';rCP()">Todas</button>`+so.map(([n])=>`<button class="ch ${fCC===n?'on':''}" onclick="fCC='${n.replace(/'/g,"\\'")}';rCP()">${n}</button>`).join('');
  const el=document.getElementById('lC');
  if(fCC!=='todas'){
    const cd=g[fCC];
    if(!cd){el.innerHTML='<div class="ey"><div class="ei">🏷️</div><p>Sem dados</p></div>';return;}
    const pc=tD>0?((cd.t/tD)*100).toFixed(1):0,ic=IC[fCC]||'💳';
    const it=cd.it.sort((a,b)=>Number(b.valor)-Number(a.valor));
    el.innerHTML=`<div class="cr" style="cursor:default;margin-bottom:10px"><div class="ct"><div class="cn" style="font-size:13px"><div class="cd" style="background:${cd.co}"></div>${ic} ${fCC}</div><div class="cvl ng" style="font-size:13px">${fmt(cd.t)}</div></div><div class="cp">${cd.q} lançamentos · ${pc}% do total</div></div><div class="st">Detalhamento</div><div class="tl">${it.map(txH).join('')}</div>`;
    return;
  }
  if(!so.length){el.innerHTML='<div class="ey"><div class="ei">🏷️</div><p>Sem categorias</p></div>';return;}
  const mx=so[0][1].t;
  el.innerHTML='<div class="st">🏷️ Ranking</div>'+so.map(([n,d])=>{
    const pc=tD>0?((d.t/tD)*100).toFixed(1):0,bw=mx>0?((d.t/mx)*100):0,ic=IC[n]||'💳';
    return`<div class="cr" onclick="fCC='${n.replace(/'/g,"\\'")}';rCP()"><div class="ct"><div class="cn"><div class="cd" style="background:${d.co}"></div>${ic} ${n} (${d.q})</div><div class="cvl" style="color:${d.co}">${fmt(d.t)}</div></div><div class="cbar"><div class="cfill" style="width:${bw}%;background:${d.co}"></div></div><div class="cp">${pc}% do total</div></div>`;
  }).join('');
}

// ANUAL
function rAn(){
  const ms=[];
  for(let m=0;m<12;m++){const d=fl(m,cA);const dp=d.filter(l=>l.tipo==='despesa').reduce((s,l)=>s+Number(l.valor),0);const rc=d.filter(l=>l.tipo==='receita').reduce((s,l)=>s+Number(l.valor),0);ms.push({n:MN[m].substring(0,3),d:dp,r:rc,s:rc-dp});}
  document.getElementById('gA').innerHTML=ms.map((m,i)=>{
    const sc=m.s>=0?'color:var(--green)':'color:var(--red)';
    return`<div class="mc ${i===mA?'at':''}" onclick="mA=${i};document.querySelectorAll('.sM2,#sM').forEach(s=>s.value=${i});af();go('pgD',document.querySelector('.nv'))"><div class="ml">${m.n}</div><div class="md">-${fmt(m.d)}</div><div class="mr">+${fmt(m.r)}</div><div class="ms" style="${sc}">${m.s>=0?'+':''}${fmt(m.s)}</div></div>`;
  }).join('');
  const lb=ms.map(m=>m.n),dD=ms.map(m=>m.d),dR=ms.map(m=>m.r);
  if(ch3)ch3.destroy();
  ch3=new Chart(document.getElementById('c3'),{type:'bar',data:{labels:lb,datasets:[{label:'Receitas',data:dR,backgroundColor:'rgba(93,232,160,.6)',borderRadius:4},{label:'Despesas',data:dD,backgroundColor:'rgba(255,107,122,.6)',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#7a8599',font:{size:9}}}},scales:{x:{ticks:{color:'#4a5568',font:{size:8}},grid:{display:false}},y:{ticks:{color:'#4a5568',font:{size:8},callback:v=>'R$'+v},grid:{color:'rgba(100,116,139,.08)'}}}}});
}

function go(id,btn){document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));document.getElementById(id).classList.add('on');document.querySelectorAll('.nv').forEach(n=>n.classList.remove('on'));if(btn)btn.classList.add('on');}

init();
</script>
</body>
