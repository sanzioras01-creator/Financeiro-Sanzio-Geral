<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Financeiro</title>
<meta name="theme-color" content="#0a0a0f"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0a0f;--s1:#111118;--s2:#18181f;--s3:#1e1e28;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);
  --text:#f0ede8;--muted:rgba(240,237,232,0.4);--muted2:rgba(240,237,232,0.2);
  --gold:#d4a843;--green:#3ddc84;--red:#ff6b6b;--blue:#6ab0ff;--r:14px;
}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;}
.shell{display:flex;height:100vh;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:220px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;}
.sb-logo{padding:20px 18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.sb-mark{width:32px;height:32px;background:linear-gradient(135deg,var(--gold),#b8860b);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.sb-text{font-size:14px;font-weight:700;letter-spacing:-.3px;}
.sb-sub{font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:.5px;}
.nav-sec{padding:10px 10px 0;}
.nav-lbl{font-size:9px;color:var(--muted2);text-transform:uppercase;letter-spacing:1.5px;padding:8px 10px 4px;font-family:'JetBrains Mono',monospace;}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);transition:all .15s;margin-bottom:2px;border:1px solid transparent;}
.ni:hover{background:var(--s2);color:var(--text);}
.ni.active{background:rgba(212,168,67,0.1);color:var(--gold);border-color:rgba(212,168,67,0.18);}
.ni-ic{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;background:rgba(255,255,255,0.04);flex-shrink:0;}
.ni.active .ni-ic{background:rgba(212,168,67,0.12);}
.sb-foot{margin-top:auto;padding:14px;border-top:1px solid var(--border);}
.period-box{background:var(--s2);border:1px solid var(--border2);border-radius:10px;padding:10px 12px;}
.period-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-family:'JetBrains Mono',monospace;margin-bottom:6px;}
.period-ctrl{display:flex;align-items:center;gap:6px;}
.p-btn{background:var(--s3);border:1px solid var(--border);border-radius:6px;color:var(--text);width:26px;height:26px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.p-btn:hover{border-color:var(--gold);color:var(--gold);}
.p-disp{flex:1;text-align:center;font-size:12px;font-weight:600;font-family:'JetBrains Mono',monospace;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:54px;border-bottom:1px solid var(--border);padding:0 22px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,15,0.92);backdrop-filter:blur(12px);flex-shrink:0;}
.page-ttl{font-size:16px;font-weight:700;}
.tb-right{display:flex;align-items:center;gap:10px;}
.tb-period{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.month-nav{display:flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--border2);border-radius:9px;padding:5px 8px;}
.mn-btn{background:var(--s3);border:1px solid var(--border);border-radius:6px;color:var(--text);width:26px;height:26px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;line-height:1;}
.mn-btn:hover{border-color:var(--gold);color:var(--gold);}
.mn-label{font-size:12px;font-weight:600;font-family:'JetBrains Mono',monospace;min-width:90px;text-align:center;white-space:nowrap;}
.scan-btn{background:linear-gradient(135deg,var(--gold),#b8860b);border:none;border-radius:9px;color:#000;padding:7px 14px;font-size:12px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;display:flex;align-items:center;gap:6px;transition:filter .15s;}
.scan-btn:hover{filter:brightness(1.12);}
.content{flex:1;overflow-y:auto;padding:20px 22px;}
.content::-webkit-scrollbar{width:3px;}
.content::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px;}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.kpi{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:14px;position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:.7;}
.kpi.kr::before{background:linear-gradient(90deg,transparent,var(--red),transparent);}
.kpi.kg::before{background:linear-gradient(90deg,transparent,var(--green),transparent);}
.kpi.ka::before{background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.kpi.kb::before{background:linear-gradient(90deg,transparent,var(--blue),transparent);}
.kpi-ic{font-size:20px;margin-bottom:8px;}
.kpi-lb{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-family:'JetBrains Mono',monospace;margin-bottom:3px;}
.kpi-val{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;line-height:1.1;margin-bottom:3px;}
.kpi-val.r{color:var(--red);}
.kpi-val.g{color:var(--green);}
.kpi-val.a{color:var(--gold);}
.kpi-val.b{color:var(--blue);}
.kpi-sb{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;}

/* PANELS */
.panel{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.ptitle{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-family:'JetBrains Mono',monospace;}
.paction{font-size:11px;color:var(--gold);cursor:pointer;background:none;border:none;font-family:'Outfit',sans-serif;font-weight:500;}

/* PROGRESS */
.prog-info{display:flex;justify-content:space-between;margin-bottom:5px;font-size:11px;}
.prog-bg{background:var(--s3);border-radius:999px;height:5px;overflow:hidden;}
.prog-fill{height:100%;border-radius:999px;transition:width .6s ease;}

/* TX */
.tx-list{display:flex;flex-direction:column;gap:5px;}
.tx{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:9px;transition:all .15s;}
.tx:hover{background:var(--s3);border-color:var(--border2);}
.tx-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.tx-info{flex:1;min-width:0;}
.tx-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tx-meta{font-size:10px;color:var(--muted);margin-top:1px;font-family:'JetBrains Mono',monospace;}
.tx-right{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.tx-cat{font-size:9px;background:rgba(255,255,255,0.05);border-radius:4px;padding:2px 6px;color:var(--muted);white-space:nowrap;max-width:90px;overflow:hidden;text-overflow:ellipsis;}
.tx-val{font-size:12px;font-weight:600;font-family:'JetBrains Mono',monospace;}
.tx-del{background:rgba(255,107,107,0.1);border:none;border-radius:5px;color:var(--red);cursor:pointer;padding:3px 7px;font-size:11px;opacity:0;transition:opacity .15s;}
.tx:hover .tx-del{opacity:1;}

/* FILTERS */
.filters{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap;}
.fi{flex:1;min-width:140px;background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:7px 11px;font-size:12px;font-family:'Outfit',sans-serif;}
.fs{background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:7px 9px;font-size:12px;font-family:'Outfit',sans-serif;cursor:pointer;}
.fi:focus,.fs:focus{outline:none;border-color:rgba(212,168,67,0.35);}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:7px 11px;background:rgba(255,255,255,0.02);border-radius:7px;margin-bottom:9px;font-size:11px;}

/* FORM */
.form-box{background:rgba(61,220,132,0.04);border:1px solid rgba(61,220,132,0.1);border-radius:var(--r);padding:14px;margin-bottom:14px;}
.form-ttl{font-size:12px;font-weight:700;color:var(--green);margin-bottom:10px;}
.form-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:7px;}
.fl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-family:'JetBrains Mono',monospace;display:block;margin-bottom:3px;}
.finput{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:7px 9px;font-size:13px;font-family:'Outfit',sans-serif;}
.finput:focus{outline:none;border-color:rgba(61,220,132,0.35);}
.btn-g{background:linear-gradient(135deg,var(--green),#2db870);border:none;border-radius:9px;color:#000;padding:9px;font-size:13px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;width:100%;margin-top:9px;}

/* CAT */
.cat-item{margin-bottom:9px;}
.cat-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.cat-nm{font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;}
.cat-d{width:7px;height:7px;border-radius:2px;flex-shrink:0;}
.cat-stats{display:flex;align-items:center;gap:8px;}
.cat-pct{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.cat-v{font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--red);}
.cat-bg{background:rgba(255,255,255,0.04);border-radius:999px;height:3px;overflow:hidden;}
.cat-fill{height:100%;border-radius:999px;transition:width .6s ease;}

/* ANNUAL */
.ann-tbl{width:100%;border-collapse:collapse;font-size:12px;}
.ann-tbl th{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-family:'JetBrains Mono',monospace;padding:7px 9px;text-align:left;border-bottom:1px solid var(--border);}
.ann-tbl td{padding:9px;border-bottom:1px solid rgba(255,255,255,0.025);font-family:'JetBrains Mono',monospace;}
.ann-tbl tr.cur td{background:rgba(212,168,67,0.04);}
.ann-tbl tr:hover td{background:rgba(255,255,255,0.015);}

/* CHARTS */
.cw{position:relative;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,0.88);backdrop-filter:blur(12px);z-index:100;display:none;align-items:center;justify-content:center;padding:16px;}
.mo.open{display:flex;}
.modal{background:var(--s1);border:1px solid var(--border2);border-radius:20px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;}
.mh{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--s1);z-index:1;}
.mt{font-size:15px;font-weight:700;}
.mc{background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--muted);cursor:pointer;padding:5px 10px;font-size:14px;transition:all .15s;}
.mc:hover{color:var(--text);}
.mb{padding:20px;}
.drop-zone{border:2px dashed rgba(255,255,255,0.1);border-radius:14px;padding:48px 20px;text-align:center;cursor:pointer;transition:all .2s;}
.drop-zone:hover,.drop-zone.over{border-color:var(--gold);background:rgba(212,168,67,0.03);}
.drop-ic{font-size:40px;margin-bottom:10px;}
.drop-t{font-size:15px;font-weight:700;margin-bottom:4px;}
.drop-s{font-size:12px;color:var(--muted);}
.spinner{width:34px;height:34px;border:3px solid rgba(212,168,67,0.15);border-top:3px solid var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg);}}
.rvw-row{display:grid;grid-template-columns:2fr 38px 44px 1fr 75px 26px;gap:4px;padding:5px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);border-radius:7px;margin-bottom:4px;align-items:center;}
.ri{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:5px;color:var(--text);padding:4px 6px;font-size:11px;font-family:'Outfit',sans-serif;width:100%;}
.ri:focus{outline:none;border-color:rgba(212,168,67,0.35);}
.btn-cfm{width:100%;padding:12px;background:linear-gradient(135deg,var(--gold),#b8860b);border:none;border-radius:12px;color:#000;font-size:14px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;margin-top:10px;}
.btn-sec{width:100%;padding:9px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;color:var(--muted);font-size:13px;font-family:'Outfit',sans-serif;cursor:pointer;margin-top:7px;}
.btn-del-sm{background:rgba(255,107,107,0.1);border:none;border-radius:5px;color:var(--red);cursor:pointer;padding:3px 6px;font-size:11px;}
.tip{margin-top:10px;padding:10px 13px;background:rgba(212,168,67,0.05);border:1px solid rgba(212,168,67,0.12);border-radius:9px;font-size:11px;color:var(--muted);}

/* TOAST */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);padding:9px 20px;border-radius:9px;font-size:13px;font-weight:600;z-index:300;animation:toastIn .25s ease;box-shadow:0 4px 20px rgba(0,0,0,.5);white-space:nowrap;}
.toast.ok{background:var(--green);color:#000;}
.toast.err{background:var(--red);color:#fff;}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

/* BOTTOM NAV mobile */
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:1px solid var(--border);padding:6px 0 calc(6px + env(safe-area-inset-bottom));z-index:50;}
.bnav-items{display:flex;justify-content:space-around;}
.bni{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 10px;border-radius:8px;cursor:pointer;color:var(--muted);font-size:9px;font-weight:600;letter-spacing:.3px;transition:all .15s;}
.bni.active{color:var(--gold);}
.bni-ic{font-size:17px;}

/* MISC */
.empty{text-align:center;padding:44px 20px;color:var(--muted);}
.empty-ic{font-size:34px;margin-bottom:8px;}
.fade-in{animation:fin .22s ease;}
@keyframes fin{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
.badge{display:inline-block;font-size:9px;padding:1px 6px;border-radius:4px;font-family:'JetBrains Mono',monospace;}
.badge-r{background:rgba(255,107,107,0.1);color:var(--red);}
.badge-g{background:rgba(61,220,132,0.1);color:var(--green);}

@media(max-width:768px){
  .sidebar{display:none;}
  .bnav{display:block;}
  .content{padding:12px 12px 78px;}
  .kpi-grid{grid-template-columns:repeat(2,1fr);gap:9px;}
  .g2{grid-template-columns:1fr;}
  .form-grid{grid-template-columns:1fr 1fr;}
  .topbar{padding:0 12px;}
  .kpi-val{font-size:17px;}
  .scan-btn span{display:none;}
  .mn-label{min-width:72px;font-size:11px;}
}
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="sb-logo">
      <div class="sb-mark">₿</div>
      <div><div class="sb-text">Financeiro</div><div class="sb-sub">CONTROLE PESSOAL</div></div>
    </div>
    <div class="nav-sec">
      <div class="nav-lbl">Visão</div>
      <div class="ni active" onclick="goNav('dashboard',this)"><div class="ni-ic">▦</div>Dashboard</div>
      <div class="ni" onclick="goNav('transacoes',this)"><div class="ni-ic">↕</div>Transações</div>
      <div class="ni" onclick="goNav('receitas',this)"><div class="ni-ic">↑</div>Receitas</div>
      <div class="nav-lbl" style="margin-top:6px">Análise</div>
      <div class="ni" onclick="goNav('categorias',this)"><div class="ni-ic">◎</div>Categorias</div>
      <div class="ni" onclick="goNav('anual',this)"><div class="ni-ic">⊞</div>Anual</div>
    </div>
    <div class="sb-foot">
      <div class="period-box">
        <div class="period-lbl">Período</div>
        <div class="period-ctrl">
          <button class="p-btn" onclick="movePeriod(-1)">‹</button>
          <div class="p-disp" id="pDisp">—</div>
          <button class="p-btn" onclick="movePeriod(1)">›</button>
        </div>
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="page-ttl" id="pageTtl">Dashboard</div>
      <div class="tb-right">
        <div class="month-nav">
          <button class="mn-btn" onclick="movePeriod(-1)">‹</button>
          <div class="mn-label" id="tbPeriod">—</div>
          <button class="mn-btn" onclick="movePeriod(1)">›</button>
        </div>
        <button class="scan-btn" onclick="openScan()">📸 <span>Escanear</span></button>
      </div>
    </div>
    <div class="content" id="content">
      <div class="empty" style="padding-top:80px">
        <div class="spinner" style="margin:0 auto 16px"></div>
        <div style="font-size:13px">Carregando dados...</div>
      </div>
    </div>
  </div>
</div>

<div class="bnav">
  <div class="bnav-items">
    <div class="bni active" onclick="goNav('dashboard',this)"><div class="bni-ic">▦</div>DASH</div>
    <div class="bni" onclick="goNav('transacoes',this)"><div class="bni-ic">↕</div>GASTOS</div>
    <div class="bni" onclick="goNav('receitas',this)"><div class="bni-ic">↑</div>RECEITAS</div>
    <div class="bni" onclick="goNav('categorias',this)"><div class="bni-ic">◎</div>CATS</div>
    <div class="bni" onclick="goNav('anual',this)"><div class="bni-ic">⊞</div>ANUAL</div>
    <div class="bni" onclick="openScan()"><div class="bni-ic">📸</div>SCAN</div>
  </div>
</div>

<div class="mo" id="modal">
  <div class="modal">
    <div class="mh">
      <div class="mt" id="mTitle">Escanear</div>
      <button class="mc" onclick="closeModal()">✕</button>
    </div>
    <div class="mb" id="mBody"></div>
  </div>
</div>

<script>

// ─── STATE ────────────────────────────────────────────────────────────────────
// IMPORTANTE: curMonth é 1-indexado (igual ao banco)
// Janeiro=1, Fevereiro=2, Março=3 ...
let curMonth = new Date().getMonth() + 1;
let curYear  = new Date().getFullYear();
let curView  = 'dashboard';
let allTxs   = [];
let allRecs  = [];
let charts   = {};
let scanned  = [];

// ─── SUPABASE ─────────────────────────────────────────────────────────────────
async function sb(path, opts) {
  const r = await fetch(SB_URL + '/rest/v1/' + path, {
    headers: HDR,
    method: (opts && opts.method) || 'GET',
    body: (opts && opts.body) || undefined
  });
  if (!r.ok) { const e = await r.text(); throw new Error(e); }
  const txt = await r.text();
  return txt ? JSON.parse(txt) : [];
}

async function loadAll() {
  const [txs, recs] = await Promise.all([
    sb('transacoes?order=ano.desc,mes.desc,dia.desc&limit=5000'),
    sb('receitas?order=ano.desc,mes.desc,dia.desc&limit=2000')
  ]);
  allTxs = txs;
  allRecs = recs;
}

// ─── DATA HELPERS ─────────────────────────────────────────────────────────────
// Filtro: compara como número para evitar problemas de tipo ("3" == 3)
function getTxs(m, y) {
  const mo = (m !== undefined) ? m : curMonth;
  const yr = y !== undefined ? y : curYear;
  return allTxs.filter(t => +t.mes === mo && +t.ano === yr);
}
function getRecs(m, y) {
  const mo = (m !== undefined) ? m : curMonth;
  const yr = y !== undefined ? y : curYear;
  return allRecs.filter(r => +r.mes === mo && +r.ano === yr);
}
function sumTxs(m, y)  { return getTxs(m,y).reduce((s,t)=>s+Number(t.valor||0),0); }
function sumRecs(m, y) { return getRecs(m,y).reduce((s,r)=>s+Number(r.valor||0),0); }

// ─── FORMAT ───────────────────────────────────────────────────────────────────
function fmt(v) {
  return 'R$\u00A0'+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── PERIOD ───────────────────────────────────────────────────────────────────
function updatePeriodUI() {
  const lbl = MONTHS[curMonth-1] + ' ' + curYear;
  const pDisp = document.getElementById('pDisp');
  if (pDisp) pDisp.textContent = MSHORT[curMonth-1]+' '+curYear;
  document.getElementById('tbPeriod').textContent = lbl;
}

function movePeriod(d) {
  curMonth += d;
  if (curMonth > 12) { curMonth = 1; curYear++; }
  if (curMonth < 1)  { curMonth = 12; curYear--; }
  updatePeriodUI();
  renderView();
}

// ─── NAV ─────────────────────────────────────────────────────────────────────
function goNav(view, el) {
  curView = view;
  document.getElementById('pageTtl').textContent = PAGE_NAMES[view];
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));
  document.querySelectorAll('.bni').forEach(n=>n.classList.remove('active'));
  const idx = VIEWS_ORDER.indexOf(view);
  const nis  = document.querySelectorAll('.ni');
  const bnis = document.querySelectorAll('.bni');
  if (nis[idx])  nis[idx].classList.add('active');
  if (bnis[idx]) bnis[idx].classList.add('active');
  renderView();
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderView() {
  killCharts();
  const fn = {dashboard:rDash,transacoes:rTxs,receitas:rRecs,categorias:rCats,anual:rAnual}[curView];
  if (fn) fn();
}
function killCharts() {
  Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});
  charts = {};
}
function setContent(h) { document.getElementById('content').innerHTML = h; }

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function rDash() {
  const txs  = getTxs();
  const recs = getRecs();
  const desp = sumTxs();
  const rec  = sumRecs();
  const saldo = rec - desp;

  const now = new Date();
  const isCurrentMonth = curMonth === now.getMonth()+1 && curYear === now.getFullYear();
  const diaHoje  = now.getDate();
  const diasMes  = new Date(curYear, curMonth, 0).getDate();
  const diasPass = isCurrentMonth ? Math.min(diaHoje, diasMes) : diasMes;
  const diasRest = isCurrentMonth ? diasMes - diaHoje : 0;
  const mediaDia = diasPass > 0 ? desp / diasPass : 0;
  const projecao = isCurrentMonth && diasPass > 0 ? (desp / diasPass) * diasMes : 0;

  const catMap = {};
  txs.forEach(t => { catMap[t.categoria] = (catMap[t.categoria]||0)+Number(t.valor||0); });
  const topCat = Object.entries(catMap).sort((a,b)=>b[1]-a[1])[0];

  const dailyMap = {};
  txs.forEach(t => { dailyMap[+t.dia] = (dailyMap[+t.dia]||0)+Number(t.valor||0); });
  const dLabels=[], dVals=[];
  for (let d=1; d<=diasMes; d++) { dLabels.push(d); dVals.push(dailyMap[d]||0); }

  const recent = txs.slice(0,5);
  const pct = rec > 0 ? Math.min(desp/rec*100,100) : (desp>0?100:0);
  const pctColor = pct>90?'var(--red)':pct>70?'var(--gold)':'var(--green)';

  setContent(`
    <div class="kpi-grid fade-in">
      <div class="kpi kr">
        <div class="kpi-ic">💸</div>
        <div class="kpi-lb">Despesas</div>
        <div class="kpi-val r">${fmt(desp)}</div>
        <div class="kpi-sb">${txs.length} lançamentos</div>
      </div>
      <div class="kpi kg">
        <div class="kpi-ic">💵</div>
        <div class="kpi-lb">Receitas</div>
        <div class="kpi-val g">${fmt(rec)}</div>
        <div class="kpi-sb">${recs.length} entradas</div>
      </div>
      <div class="kpi ${saldo>=0?'ka':'kr'}">
        <div class="kpi-ic">${saldo>=0?'⚖️':'⚠️'}</div>
        <div class="kpi-lb">Saldo</div>
        <div class="kpi-val ${saldo>=0?'a':'r'}">${fmt(saldo)}</div>
        <div class="kpi-sb">${saldo>=0?'Positivo ✓':'Atenção!'}</div>
      </div>
      <div class="kpi kb">
        <div class="kpi-ic">📅</div>
        <div class="kpi-lb">Média / Dia</div>
        <div class="kpi-val b">${fmt(mediaDia)}</div>
        <div class="kpi-sb">${diasRest>0?diasRest+' dias restantes':'Período encerrado'}</div>
      </div>
    </div>

    ${(rec>0||desp>0)?`
    <div class="panel fade-in">
      <div class="ph">
        <div class="ptitle">Saúde financeira do mês</div>
        <div style="font-size:11px;font-family:'JetBrains Mono',monospace;color:${pctColor}">${pct.toFixed(1)}% comprometido</div>
      </div>
      <div class="prog-info">
        <span>Gasto: <strong style="color:var(--red)">${fmt(desp)}</strong></span>
        <span>Receita: <strong style="color:var(--green)">${fmt(rec)}</strong></span>
      </div>
      <div class="prog-bg"><div class="prog-fill" style="width:${pct}%;background:${pctColor}"></div></div>
      <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:var(--muted)">
        ${topCat?`<span>🏆 Maior gasto: <strong style="color:${CAT_CLR[topCat[0]]||'var(--gold)'}">${topCat[0]}</strong> ${fmt(topCat[1])}</span>`:'<span></span>'}
        ${isCurrentMonth&&projecao>0?`<span>Projeção mês: <strong style="color:${projecao>rec?'var(--red)':'var(--gold)'}">${fmt(projecao)}</strong></span>`:''}
      </div>
    </div>`:''
    }

    <div class="g2 fade-in">
      ${dVals.some(v=>v>0)?`
      <div class="panel">
        <div class="ph"><div class="ptitle">Gastos Diários — ${MONTHS[curMonth-1]}</div></div>
        <div class="cw" style="height:150px"><canvas id="cDaily"></canvas></div>
      </div>`:''}
      ${Object.keys(catMap).length>0?`
      <div class="panel">
        <div class="ph"><div class="ptitle">Por Categoria</div></div>
        <div class="cw" style="height:150px"><canvas id="cCat"></canvas></div>
      </div>`:''}
    </div>

    <div class="panel fade-in">
      <div class="ph">
        <div class="ptitle">Últimos Lançamentos</div>
        <button class="paction" onclick="goNav('transacoes',null)">Ver todos →</button>
      </div>
      ${recent.length>0
        ? '<div class="tx-list">'+recent.map(t=>txRow(t,false)).join('')+'</div>'
        : '<div class="empty"><div class="empty-ic">📭</div><div>Nenhum lançamento neste período</div></div>'}
    </div>
  `);

  // Chart: daily
  if (dVals.some(v=>v>0)) {
    const ctx = document.getElementById('cDaily').getContext('2d');
    charts.daily = new Chart(ctx, {
      type:'bar',
      data:{ labels:dLabels, datasets:[{ data:dVals, backgroundColor:dVals.map((_,i)=>isCurrentMonth&&i+1===diaHoje?'rgba(212,168,67,0.9)':'rgba(255,107,107,0.45)'), borderRadius:3 }] },
      options:{ responsive:true,maintainAspectRatio:false, plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fmt(c.raw)}}}, scales:{ x:{ticks:{color:'rgba(240,237,232,0.3)',font:{size:9}},grid:{display:false}}, y:{ticks:{color:'rgba(240,237,232,0.3)',font:{size:9},callback:v=>'R$'+(v>=1000?(v/1000).toFixed(0)+'k':v)},grid:{color:'rgba(255,255,255,0.03)'}} } }
    });
  }
  // Chart: donut cat
  if (Object.keys(catMap).length>0) {
    const lbls = Object.keys(catMap).sort((a,b)=>catMap[b]-catMap[a]).slice(0,6);
    const ctx2 = document.getElementById('cCat').getContext('2d');
    charts.cat = new Chart(ctx2, {
      type:'doughnut',
      data:{ labels:lbls, datasets:[{ data:lbls.map(l=>catMap[l]), backgroundColor:lbls.map(l=>CAT_CLR[l]||'#475569'), borderWidth:2, borderColor:'#111118' }] },
      options:{ responsive:true,maintainAspectRatio:false,cutout:'58%', plugins:{ legend:{position:'right',labels:{color:'rgba(240,237,232,0.5)',font:{size:10,family:'Outfit'},boxWidth:9,padding:7}}, tooltip:{callbacks:{label:c=>' '+fmt(c.raw)}} } }
    });
  }
}

// ─── TRANSAÇÕES ───────────────────────────────────────────────────────────────
function rTxs(search, catF, tipoF, sort) {
  search = search||''; catF=catF||''; tipoF=tipoF||''; sort=sort||'dia';
  let txs = getTxs();
  if (search) txs = txs.filter(t=>(t.nome||'').toLowerCase().includes(search.toLowerCase()));
  if (catF)  txs = txs.filter(t=>t.categoria===catF);
  if (tipoF) txs = txs.filter(t=>t.tipo===tipoF);
  if (sort==='dia')   txs.sort((a,b)=>Number(b.dia)-Number(a.dia));
  if (sort==='valor') txs.sort((a,b)=>Number(b.valor)-Number(a.valor));
  if (sort==='cat')   txs.sort((a,b)=>(a.categoria||'').localeCompare(b.categoria||''));
  const tot = txs.reduce((s,t)=>s+Number(t.valor||0),0);

  setContent(`
    <div class="panel fade-in">
      <div class="filters">
        <input class="fi" id="s1" placeholder="🔍 Buscar..." value="${esc(search)}"
          oninput="rTxs(this.value,getId('s2'),getId('s3'),getId('s4'))"/>
        <select class="fs" id="s2" onchange="rTxs(getId('s1'),this.value,getId('s3'),getId('s4'))">
          <option value="">Todas categorias</option>
          ${CATS.map(c=>`<option ${catF===c?'selected':''}>${c}</option>`).join('')}
        </select>
        <select class="fs" id="s3" onchange="rTxs(getId('s1'),getId('s2'),this.value,getId('s4'))">
          <option value="">Todos tipos</option>
          ${TIPOS.map(t=>`<option ${tipoF===t?'selected':''}>${t}</option>`).join('')}
        </select>
        <select class="fs" id="s4" onchange="rTxs(getId('s1'),getId('s2'),getId('s3'),this.value)">
          <option value="dia" ${sort==='dia'?'selected':''}>Data ↓</option>
          <option value="valor" ${sort==='valor'?'selected':''}>Valor ↓</option>
          <option value="cat" ${sort==='cat'?'selected':''}>Categoria A-Z</option>
        </select>
      </div>
      <div class="sum-row">
        <span style="color:var(--muted)">${txs.length} lançamento${txs.length!==1?'s':''}</span>
        <span style="font-weight:700;color:var(--red);font-family:'JetBrains Mono',monospace">${fmt(tot)}</span>
      </div>
      <div class="tx-list">
        ${txs.length>0 ? txs.map(t=>txRow(t,true)).join('') : '<div class="empty"><div class="empty-ic">🔍</div><div>Nenhum resultado</div></div>'}
      </div>
    </div>
  `);
}

function getId(id) { const el=document.getElementById(id); return el?el.value:''; }

// ─── RECEITAS ─────────────────────────────────────────────────────────────────
function rRecs() {
  const recs = getRecs().slice().sort((a,b)=>Number(b.dia)-Number(a.dia));
  const tot  = recs.reduce((s,r)=>s+Number(r.valor||0),0);
  const hoje = new Date().getDate();

  setContent(`
    <div class="form-box fade-in">
      <div class="form-ttl">➕ Adicionar Receita</div>
      <div class="form-grid">
        <div><label class="fl">Nome / Origem</label><input class="finput" id="rN" placeholder="Ex: Salário, Pix recebido..."/></div>
        <div><label class="fl">Dia</label><input class="finput" id="rD" type="number" value="${hoje}" min="1" max="31"/></div>
        <div><label class="fl">Valor R$</label><input class="finput" id="rV" type="number" placeholder="0,00" step="0.01" style="color:var(--green)"/></div>
      </div>
      <button class="btn-g" onclick="addRec()">💵 Adicionar Receita</button>
    </div>
    <div class="panel fade-in">
      <div class="ph">
        <div class="ptitle">Receitas — ${MONTHS[curMonth-1]} ${curYear}</div>
        <div style="font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--green)">${fmt(tot)}</div>
      </div>
      <div class="tx-list">
        ${recs.length>0 ? recs.map(r=>`
          <div class="tx">
            <div class="tx-dot" style="background:var(--green)"></div>
            <div class="tx-info">
              <div class="tx-name">${esc(r.nome||'—')}</div>
              <div class="tx-meta">Dia ${r.dia} · ${MSHORT[curMonth-1]} ${curYear}</div>
            </div>
            <div class="tx-right">
              <div class="tx-val" style="color:var(--green)">+${fmt(r.valor)}</div>
              <button class="tx-del" style="opacity:1" onclick="delRec(${r.id})">✕</button>
            </div>
          </div>`).join('')
          : '<div class="empty"><div class="empty-ic">📭</div><div>Nenhuma receita neste período</div></div>'}
      </div>
    </div>
  `);
}

// ─── CATEGORIAS ───────────────────────────────────────────────────────────────
function rCats() {
  const txs = getTxs();
  const tot = sumTxs();
  const catMap = {};
  txs.forEach(t=>{ catMap[t.categoria]=(catMap[t.categoria]||0)+Number(t.valor||0); });
  const cats = Object.entries(catMap).sort((a,b)=>b[1]-a[1]);

  if (!cats.length) {
    setContent('<div class="empty" style="padding-top:80px"><div class="empty-ic">📭</div><div>Nenhum gasto neste período</div></div>');
    return;
  }

  const tipoMap = {};
  txs.forEach(t=>{ tipoMap[t.tipo]=(tipoMap[t.tipo]||0)+Number(t.valor||0); });

  setContent(`
    <div class="g2 fade-in">
      <div class="panel">
        <div class="ph"><div class="ptitle">Categorias</div></div>
        <div class="cw" style="height:200px"><canvas id="cCatFull"></canvas></div>
      </div>
      <div class="panel">
        <div class="ph"><div class="ptitle">Forma de Pagamento</div></div>
        <div class="cw" style="height:200px"><canvas id="cTipo"></canvas></div>
      </div>
    </div>
    <div class="panel fade-in">
      <div class="ph">
        <div class="ptitle">Detalhamento</div>
        <div style="font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace">Total: ${fmt(tot)}</div>
      </div>
      ${cats.map(([name,val])=>{
        const pct = tot>0?(val/tot*100).toFixed(1):0;
        const cnt = txs.filter(t=>t.categoria===name).length;
        return `
          <div class="cat-item">
            <div class="cat-hd">
              <div class="cat-nm">
                <div class="cat-d" style="background:${CAT_CLR[name]||'#475569'}"></div>
                ${esc(name)}
                <span class="badge badge-r">${cnt}×</span>
              </div>
              <div class="cat-stats">
                <span class="cat-pct">${pct}%</span>
                <span class="cat-v">${fmt(val)}</span>
              </div>
            </div>
            <div class="cat-bg"><div class="cat-fill" style="width:${pct}%;background:${CAT_CLR[name]||'#475569'}"></div></div>
          </div>`;
      }).join('')}
    </div>
  `);

  const lbls1 = cats.map(([n])=>n.length>14?n.slice(0,14)+'…':n);
  const ctx1 = document.getElementById('cCatFull').getContext('2d');
  charts.cf = new Chart(ctx1,{
    type:'bar',
    data:{labels:lbls1,datasets:[{data:cats.map(([,v])=>v),backgroundColor:cats.map(([n])=>CAT_CLR[n]||'#475569'),borderRadius:5}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fmt(c.raw)}}},scales:{x:{ticks:{color:'rgba(240,237,232,0.3)',font:{size:10}},grid:{color:'rgba(255,255,255,0.03)'}},y:{ticks:{color:'rgba(240,237,232,0.5)',font:{size:10,family:'Outfit'}},grid:{display:false}}}}
  });

  const tkys = Object.keys(tipoMap);
  const ctx2 = document.getElementById('cTipo').getContext('2d');
  charts.tipo = new Chart(ctx2,{
    type:'doughnut',
    data:{labels:tkys,datasets:[{data:tkys.map(k=>tipoMap[k]),backgroundColor:['#6366f1','#ec4899','#f59e0b','#3b82f6','#22c55e'],borderWidth:2,borderColor:'#111118'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'55%',plugins:{legend:{position:'right',labels:{color:'rgba(240,237,232,0.5)',font:{size:10,family:'Outfit'},boxWidth:9,padding:7}},tooltip:{callbacks:{label:c=>' '+fmt(c.raw)}}}}
  });
}

// ─── ANUAL ────────────────────────────────────────────────────────────────────
function rAnual() {
  const rows = MONTHS.map((m,i)=>{
    const mo = i+1;
    const d=sumTxs(mo,curYear), r=sumRecs(mo,curYear);
    return {mes:m,mo,d,r,s:r-d};
  });
  const totD=rows.reduce((s,r)=>s+r.d,0);
  const totR=rows.reduce((s,r)=>s+r.r,0);
  const comDados=rows.filter(r=>r.d>0||r.r>0).length;

  setContent(`
    <div class="kpi-grid fade-in" style="grid-template-columns:repeat(3,1fr)">
      <div class="kpi kr">
        <div class="kpi-ic">💸</div><div class="kpi-lb">Despesas ${curYear}</div>
        <div class="kpi-val r">${fmt(totD)}</div><div class="kpi-sb">${comDados} meses com dados</div>
      </div>
      <div class="kpi kg">
        <div class="kpi-ic">💵</div><div class="kpi-lb">Receitas ${curYear}</div>
        <div class="kpi-val g">${fmt(totR)}</div><div class="kpi-sb">&nbsp;</div>
      </div>
      <div class="kpi ${totR-totD>=0?'ka':'kr'}">
        <div class="kpi-ic">⚖️</div><div class="kpi-lb">Saldo Anual</div>
        <div class="kpi-val ${totR-totD>=0?'a':'r'}">${fmt(totR-totD)}</div>
        <div class="kpi-sb">${totR-totD>=0?'Positivo ✓':'Negativo ⚠️'}</div>
      </div>
    </div>

    <div class="panel fade-in">
      <div class="ph"><div class="ptitle">Receitas vs Despesas — ${curYear}</div></div>
      <div class="cw" style="height:220px"><canvas id="cAnual"></canvas></div>
    </div>

    <div class="panel fade-in">
      <div class="ph"><div class="ptitle">Resumo por Mês</div></div>
      <table class="ann-tbl">
        <tr><th>Mês</th><th>Receitas</th><th>Despesas</th><th>Saldo</th></tr>
        ${rows.map(r=>`
          <tr class="${r.mo===curMonth?'cur':''}">
            <td style="font-weight:600;color:${r.mo===curMonth?'var(--gold)':'var(--text)'}">${r.mes}</td>
            <td style="color:var(--green)">${r.r>0?fmt(r.r):'—'}</td>
            <td style="color:var(--red)">${r.d>0?fmt(r.d):'—'}</td>
            <td style="font-weight:700;color:${r.s>=0?'var(--green)':'var(--red)'}">${(r.r>0||r.d>0)?fmt(r.s):'—'}</td>
          </tr>`).join('')}
        <tr style="border-top:1px solid rgba(255,255,255,0.1)">
          <td style="font-weight:700">Total</td>
          <td style="font-weight:700;color:var(--green)">${fmt(totR)}</td>
          <td style="font-weight:700;color:var(--red)">${fmt(totD)}</td>
          <td style="font-weight:700;color:${totR-totD>=0?'var(--green)':'var(--red)'}">${fmt(totR-totD)}</td>
        </tr>
      </table>
    </div>
  `);

  const ctx = document.getElementById('cAnual').getContext('2d');
  charts.anual = new Chart(ctx,{
    type:'bar',
    data:{labels:MSHORT,datasets:[
      {label:'Receitas',data:rows.map(r=>r.r),backgroundColor:'rgba(61,220,132,0.6)',borderRadius:5},
      {label:'Despesas',data:rows.map(r=>r.d),backgroundColor:'rgba(255,107,107,0.6)',borderRadius:5}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'rgba(240,237,232,0.5)',font:{family:'Outfit',size:11},boxWidth:11}},tooltip:{callbacks:{label:c=>' '+fmt(c.raw)}}},
      scales:{x:{ticks:{color:'rgba(240,237,232,0.4)',font:{size:10}},grid:{display:false}},y:{ticks:{color:'rgba(240,237,232,0.3)',font:{size:10},callback:v=>'R$'+(v/1000).toFixed(0)+'k'},grid:{color:'rgba(255,255,255,0.03)'}}}}
  });
}

// ─── TX ROW ───────────────────────────────────────────────────────────────────
function txRow(t, showDel) {
  const clr = CAT_CLR[t.categoria]||'#475569';
  return `
    <div class="tx">
      <div class="tx-dot" style="background:${clr}"></div>
      <div class="tx-info">
        <div class="tx-name">${esc(t.nome||'—')}</div>
        <div class="tx-meta">Dia ${t.dia} · ${esc(t.tipo||'')} · ${t.pago?'✅':'⏳'}</div>
      </div>
      <div class="tx-right">
        <div class="tx-cat">${esc(t.categoria||'')}</div>
        <div class="tx-val" style="color:var(--red)">-${fmt(t.valor)}</div>
        ${showDel?`<button class="tx-del" onclick="delTx(${t.id})">✕</button>`:''}
      </div>
    </div>`;
}

// ─── CRUD ─────────────────────────────────────────────────────────────────────
async function delTx(id) {
  if (!confirm('Remover este lançamento?')) return;
  try {
    await sb('transacoes?id=eq.'+id,{method:'DELETE'});
    allTxs = allTxs.filter(t=>t.id!==id);
    renderView(); toast('Removido!');
  } catch(e) { toast('Erro: '+e.message,true); }
}

async function delRec(id) {
  if (!confirm('Remover esta receita?')) return;
  try {
    await sb('receitas?id=eq.'+id,{method:'DELETE'});
    allRecs = allRecs.filter(r=>r.id!==id);
    renderView(); toast('Removido!');
  } catch(e) { toast('Erro: '+e.message,true); }
}

async function addRec() {
  const nome  = (document.getElementById('rN').value||'').trim();
  const dia   = parseInt(document.getElementById('rD').value)||0;
  const valor = parseFloat(document.getElementById('rV').value)||0;
  if (!nome)          { toast('Informe o nome',true); return; }
  if (valor<=0)       { toast('Informe um valor válido',true); return; }
  if (dia<1||dia>31)  { toast('Dia inválido',true); return; }
  try {
    const saved = await sb('receitas',{method:'POST',body:JSON.stringify([{nome,dia,mes:curMonth,ano:curYear,valor}])});
    allRecs.unshift(saved[0]);
    renderView(); toast('Receita adicionada! 💵');
  } catch(e) { toast('Erro: '+e.message,true); }
}

// ─── SCAN ─────────────────────────────────────────────────────────────────────
function openScan() {
  scanned=[];
  document.getElementById('modal').classList.add('open');
  document.getElementById('mTitle').textContent='📸 Escanear Extrato';
  document.getElementById('mBody').innerHTML=`
    <div class="drop-zone" id="dz" onclick="document.getElementById('fin').click()">
      <input type="file" id="fin" accept="image/*" multiple style="display:none" onchange="handleFiles(this.files)"/>
      <div class="drop-ic">📄</div>
      <div class="drop-t">Toque para selecionar fotos</div>
      <div class="drop-s">Extrato, comprovante Pix, fatura — aceita múltiplas imagens</div>
    </div>
    <div class="tip">💡 A IA extrai e categoriza automaticamente todos os lançamentos encontrados.</div>`;
  const dz=document.getElementById('dz');
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
  dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
  dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');handleFiles(e.dataTransfer.files);});
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

async function handleFiles(files) {
  if (!files.length) return;
  document.getElementById('mTitle').textContent='🤖 Analisando com IA...';
  document.getElementById('mBody').innerHTML=`
    <div style="text-align:center;padding:52px 0">
      <div class="spinner" style="margin-bottom:16px"></div>
      <div style="font-size:14px;font-weight:600">Processando ${files.length} imagem${files.length>1?'ns':''}...</div>
      <div style="font-size:12px;color:var(--muted);margin-top:5px">Extraindo e categorizando lançamentos</div>
    </div>`;
  try {
    const imgs = await Promise.all(Array.from(files).map(async f=>({
      type:'image', source:{type:'base64',media_type:f.type||'image/jpeg',data:await toB64(f)}
    })));
    const resp = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514', max_tokens:4000,
        system:`Extraia TODOS os lançamentos/despesas visíveis nas imagens de extrato bancário.
Retorne APENAS um JSON array válido. Sem markdown, sem texto extra, apenas o array JSON.
Campos obrigatórios:
- nome: string (máx 40 chars, nome do estabelecimento limpo, sem "Pix Enviado Para", "Débito" etc)
- dia: number (dia do mês, 1-31)
- tipo: um de "${TIPOS.join('"|"')}"
- categoria: um de "${CATS.join('"|"')}"
- valor: number positivo (apenas número, ex: 25.90)
- pago: boolean (true por padrão)
Apenas o array JSON.`,
        messages:[{role:'user',content:[...imgs,{type:'text',text:'Extraia todos os lançamentos visíveis.'}]}]
      })
    });
    const d = await resp.json();
    const txt = (d.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').replace(/```json|```/g,'').trim();
    scanned = JSON.parse(txt);
    renderReview();
  } catch(e) {
    document.getElementById('mBody').innerHTML=`
      <div class="empty"><div class="empty-ic">⚠️</div>
      <div style="margin-bottom:6px">Erro ao processar</div>
      <div style="font-size:11px">${esc(e.message)}</div>
      <button class="btn-sec" onclick="openScan()" style="margin-top:14px">Tentar novamente</button></div>`;
  }
}

function renderReview() {
  const tot = scanned.reduce((s,e)=>s+Number(e.valor||0),0);
  document.getElementById('mTitle').textContent=`✅ ${scanned.length} lançamentos`;
  document.getElementById('mBody').innerHTML=`
    <div style="display:flex;justify-content:space-between;padding:7px 11px;background:rgba(255,255,255,0.02);border-radius:8px;margin-bottom:9px;font-size:11px">
      <span style="color:var(--muted)">${scanned.length} itens · Revise e edite antes de salvar</span>
      <span style="font-weight:700;color:var(--red);font-family:'JetBrains Mono',monospace">${fmt(tot)}</span>
    </div>
    <div style="display:grid;grid-template-columns:2fr 38px 44px 1fr 75px 26px;gap:4px;padding:3px 5px;margin-bottom:4px;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-family:'JetBrains Mono',monospace">
      <div>Nome</div><div>Dia</div><div>Tipo</div><div>Categoria</div><div>Valor</div><div></div>
    </div>
    <div style="max-height:350px;overflow-y:auto" id="rvwList">
      ${scanned.map((e,i)=>`
        <div class="rvw-row">
          <input class="ri" value="${esc(e.nome||'')}" onchange="scanned[${i}].nome=this.value"/>
          <input class="ri" type="number" value="${e.dia||1}" min="1" max="31" onchange="scanned[${i}].dia=Number(this.value)"/>
          <select class="ri" onchange="scanned[${i}].tipo=this.value">
            ${TIPOS.map(t=>`<option ${e.tipo===t?'selected':''}>${t}</option>`).join('')}
          </select>
          <select class="ri" onchange="scanned[${i}].categoria=this.value">
            ${CATS.map(c=>`<option ${e.categoria===c?'selected':''}>${c}</option>`).join('')}
          </select>
          <input class="ri" type="number" value="${e.valor||''}" step="0.01" style="color:var(--red)" onchange="scanned[${i}].valor=Number(this.value)"/>
          <button class="btn-del-sm" onclick="scanned.splice(${i},1);renderReview()">✕</button>
        </div>`).join('')}
    </div>
    <button class="btn-cfm" onclick="confirmScan()">✅ Salvar ${scanned.length} lançamentos → ${MONTHS[curMonth-1]} ${curYear}</button>
    <button class="btn-sec" onclick="openScan()">🔄 Nova imagem</button>`;
}

async function confirmScan() {
  if (!scanned.length) return;
  try {
    const rows = scanned.map(e=>({
      nome: e.nome||'',
      dia: parseInt(e.dia)||1,
      mes: curMonth,   // 1-indexado, igual ao banco
      ano: curYear,
      tipo: e.tipo||'Pix',
      categoria: e.categoria||'Outros',
      valor: parseFloat(e.valor)||0,
      pago: e.pago!==false
    }));
    const saved = await sb('transacoes',{method:'POST',body:JSON.stringify(rows)});
    allTxs = [...saved,...allTxs];
    closeModal(); renderView();
    toast(`✅ ${saved.length} lançamentos salvos!`);
  } catch(e) { toast('Erro: '+e.message,true); }
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function toB64(f) {
  return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result.split(',')[1]); r.onerror=rej; r.readAsDataURL(f); });
}
function toast(msg,err) {
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div'); t.className='toast '+(err?'err':'ok'); t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),3500);
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
async function boot() {
  updatePeriodUI();
  try {
    await loadAll();
    renderView();
  } catch(e) {
    setContent(`<div class="empty" style="padding-top:80px">
      <div class="empty-ic">⚠️</div>
      <div style="margin-bottom:6px">Erro de conexão</div>
      <div style="font-size:11px">${esc(e.message)}</div>
    </div>`);
  }
}
boot();
</script>
</body>
</html>
