<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Financeiro Sanzio</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f172a;
    --bg2: #1e293b;
    --bg3: #334155;
    --text: #f1f5f9;
    --text2: #94a3b8;
    --accent: #38bdf8;
    --green: #4ade80;
    --red: #f87171;
    --orange: #fb923c;
    --purple: #a78bfa;
    --pink: #f472b6;
    --radius: 16px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
    -webkit-font-smoothing: antialiased;
  }
  .loading-screen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999; transition: opacity .4s;
  }
  .loading-screen.hide { opacity: 0; pointer-events: none; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--bg3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Header */
  .header {
    padding: 20px 16px 12px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .header h1 { font-size: 20px; font-weight: 700; }
  .header .mes-selector {
    background: var(--bg2); border: 1px solid var(--bg3);
    color: var(--text); padding: 6px 12px; border-radius: 8px;
    font-family: inherit; font-size: 13px; cursor: pointer;
  }

  /* KPI Cards */
  .kpi-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; padding: 0 16px 16px;
  }
  .kpi {
    background: var(--bg2); border-radius: var(--radius);
    padding: 14px; position: relative; overflow: hidden;
  }
  .kpi::before {
    content: ''; position: absolute; top: 0; left: 0;
    width: 4px; height: 100%; border-radius: 4px 0 0 4px;
  }
  .kpi.receita::before { background: var(--green); }
  .kpi.despesa::before { background: var(--red); }
  .kpi.saldo::before { background: var(--accent); }
  .kpi.fixas::before { background: var(--orange); }
  .kpi-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
  .kpi-value { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 600; }
  .kpi-value.pos { color: var(--green); }
  .kpi-value.neg { color: var(--red); }
  .kpi.full { grid-column: 1 / -1; }

  /* Section */
  .section { padding: 0 16px 16px; }
  .section-title {
    font-size: 14px; font-weight: 600; color: var(--text2);
    text-transform: uppercase; letter-spacing: .5px;
    margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
  }
  .section-title span { font-size: 16px; }

  /* Chart Container */
  .chart-card {
    background: var(--bg2); border-radius: var(--radius);
    padding: 16px; margin-bottom: 12px;
  }
  .chart-card h3 { font-size: 13px; color: var(--text2); margin-bottom: 12px; }
  .chart-wrap { position: relative; height: 220px; }

  /* Transaction List */
  .tx-list { display: flex; flex-direction: column; gap: 6px; }
  .tx-item {
    background: var(--bg2); border-radius: 12px;
    padding: 12px 14px; display: flex; align-items: center; gap: 12px;
    transition: background .2s;
  }
  .tx-item:active { background: var(--bg3); }
  .tx-icon {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .tx-info { flex: 1; min-width: 0; }
  .tx-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .tx-valor { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; text-align: right; flex-shrink: 0; }
  .tx-valor.desp { color: var(--red); }
  .tx-valor.rec { color: var(--green); }
  .tx-badge {
    display: inline-block; font-size: 9px; padding: 1px 5px;
    border-radius: 4px; font-weight: 600; margin-left: 4px;
  }
  .tx-badge.fixa { background: rgba(251,146,60,.2); color: var(--orange); }

  /* Filter bar */
  .filter-bar {
    display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto;
    padding-bottom: 4px; -webkit-overflow-scrolling: touch;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-btn {
    background: var(--bg2); border: 1px solid var(--bg3);
    color: var(--text2); padding: 6px 12px; border-radius: 20px;
    font-size: 12px; font-family: inherit; white-space: nowrap;
    cursor: pointer; transition: all .2s;
  }
  .filter-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }

  /* Fixas table */
  .fixas-grid { display: flex; flex-direction: column; gap: 6px; }
  .fixa-item {
    background: var(--bg2); border-radius: 12px;
    padding: 12px 14px; display: flex; align-items: center; justify-content: space-between;
  }
  .fixa-left { display: flex; align-items: center; gap: 10px; }
  .fixa-status {
    width: 10px; height: 10px; border-radius: 50%;
  }
  .fixa-status.pago { background: var(--green); }
  .fixa-status.pendente { background: var(--red); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
  .fixa-name { font-size: 13px; font-weight: 500; }
  .fixa-cat { font-size: 11px; color: var(--text2); }
  .fixa-valor { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; color: var(--orange); }

  /* Category breakdown */
  .cat-item {
    background: var(--bg2); border-radius: 12px;
    padding: 12px 14px; margin-bottom: 6px;
  }
  .cat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .cat-name { font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .cat-dot { width: 8px; height: 8px; border-radius: 50%; }
  .cat-valor { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; }
  .cat-bar { height: 4px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
  .cat-bar-fill { height: 100%; border-radius: 4px; transition: width .6s ease; }
  .cat-pct { font-size: 11px; color: var(--text2); margin-top: 4px; }

  /* Annual view */
  .annual-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  }
  .month-card {
    background: var(--bg2); border-radius: 12px; padding: 10px; text-align: center;
    cursor: pointer; transition: all .2s;
  }
  .month-card:hover { background: var(--bg3); }
  .month-card.active { border: 1px solid var(--accent); }
  .month-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .month-desp { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--red); }
  .month-rec { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--green); }
  .month-saldo { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; margin-top: 2px; }

  /* Bottom Nav */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--bg2); border-top: 1px solid var(--bg3);
    display: flex; justify-content: space-around; align-items: center;
    padding: 8px 0 max(8px, env(safe-area-inset-bottom));
    z-index: 100;
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center;
    gap: 2px; font-size: 10px; color: var(--text2);
    cursor: pointer; padding: 4px 12px; transition: color .2s;
    background: none; border: none; font-family: inherit;
  }
  .nav-item.active { color: var(--accent); }
  .nav-item .nav-icon { font-size: 20px; }

  /* Page visibility */
  .page { display: none; }
  .page.active { display: block; }

  /* Search */
  .search-box {
    background: var(--bg2); border: 1px solid var(--bg3);
    border-radius: 10px; padding: 10px 14px;
    color: var(--text); font-family: inherit; font-size: 14px;
    width: 100%; margin-bottom: 12px; outline: none;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text2); }

  /* Empty state */
  .empty-state {
    text-align: center; padding: 40px 20px; color: var(--text2);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 4px; }
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
</div>

<!-- ========== DASHBOARD ========== -->
<div class="page active" id="pageDash">
  <div class="header">
    <h1>💰 Financeiro</h1>
    <select class="mes-selector" id="mesSel" onchange="carregarDados()"></select>
  </div>

  <div class="kpi-grid">
    <div class="kpi receita">
      <div class="kpi-label">Receitas</div>
      <div class="kpi-value pos" id="kpiRec">R$ 0</div>
    </div>
    <div class="kpi despesa">
      <div class="kpi-label">Despesas</div>
      <div class="kpi-value neg" id="kpiDesp">R$ 0</div>
    </div>
    <div class="kpi fixas">
      <div class="kpi-label">Fixas do Mês</div>
      <div class="kpi-value" id="kpiFixas" style="color:var(--orange)">R$ 0</div>
    </div>
    <div class="kpi saldo">
      <div class="kpi-label">Saldo</div>
      <div class="kpi-value" id="kpiSaldo">R$ 0</div>
    </div>
  </div>

  <div class="section">
    <div class="chart-card">
      <h3>Despesas por Categoria</h3>
      <div class="chart-wrap"><canvas id="chartCat"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>Evolução Diária (Despesas)</h3>
      <div class="chart-wrap"><canvas id="chartDia"></canvas></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title"><span>📋</span> Últimos Lançamentos</div>
    <div class="tx-list" id="ultimosTx"></div>
  </div>
</div>

<!-- ========== LANÇAMENTOS ========== -->
<div class="page" id="pageLanc">
  <div class="header">
    <h1>📋 Lançamentos</h1>
    <select class="mes-selector" id="mesSel2" onchange="syncMes(this.value)"></select>
  </div>
  <div class="section">
    <input type="text" class="search-box" id="searchLanc" placeholder="Buscar lançamento..." oninput="renderLancamentos()">
    <div class="filter-bar" id="filterBar"></div>
    <div class="tx-list" id="listLanc"></div>
  </div>
</div>

<!-- ========== FIXAS ========== -->
<div class="page" id="pageFixas">
  <div class="header">
    <h1>📌 Despesas Fixas</h1>
  </div>
  <div class="section">
    <div class="kpi-grid" style="margin-bottom:16px;">
      <div class="kpi fixas full">
        <div class="kpi-label">Total Fixas Mensais</div>
        <div class="kpi-value" id="kpiFixasTotal" style="color:var(--orange)">R$ 0</div>
      </div>
    </div>
    <div class="fixas-grid" id="listFixas"></div>
  </div>
</div>

<!-- ========== CATEGORIAS ========== -->
<div class="page" id="pageCat">
  <div class="header">
    <h1>📊 Categorias</h1>
    <select class="mes-selector" id="mesSel3" onchange="syncMes(this.value)"></select>
  </div>
  <div class="section" id="listCat"></div>
</div>

<!-- ========== ANUAL ========== -->
<div class="page" id="pageAnual">
  <div class="header">
    <h1>📈 Visão Anual</h1>
  </div>
  <div class="section">
    <div class="chart-card">
      <h3>Despesas vs Receitas por Mês</h3>
      <div class="chart-wrap" style="height:250px;"><canvas id="chartAnual"></canvas></div>
    </div>
    <div class="annual-grid" id="gridAnual"></div>
  </div>
</div>

<!-- ========== BOTTOM NAV ========== -->
<nav class="bottom-nav">
  <button class="nav-item active" onclick="navTo('pageDash',this)">
    <span class="nav-icon">📊</span>Dashboard
  </button>
  <button class="nav-item" onclick="navTo('pageLanc',this)">
    <span class="nav-icon">📋</span>Lançamentos
  </button>
  <button class="nav-item" onclick="navTo('pageFixas',this)">
    <span class="nav-icon">📌</span>Fixas
  </button>
  <button class="nav-item" onclick="navTo('pageCat',this)">
    <span class="nav-icon">🏷️</span>Categorias
  </button>
  <button class="nav-item" onclick="navTo('pageAnual',this)">
    <span class="nav-icon">📈</span>Anual
  </button>
</nav>

<script>
// ========== CONFIG ==========
const SUPA_URL = 'https://wqajkohquvoukljpkqet.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndxYWprb2hxdXZvdWtsanBrcWV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzIzNjIsImV4cCI6MjA4ODE0ODM2Mn0.-GsT75uLNZJJuFErpYjvOZ0lNJWlrg2qHpNUhGqUgus';

const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

const ICON_CAT = {
  'Moradia': '🏠', 'Mercado': '🛒', 'Transporte/Gasolina': '⛽',
  'Lazer': '🎉', 'Assinaturas': '📺', 'Saúde e Beleza': '💊',
  'Autoaperfeiçoamento': '📚', 'Folha de Pagamento': '👷',
  'Despesas eventuais': '💸', 'Receita': '💵'
};

let lancamentos = [];
let categorias = [];
let mesAtual = new Date().getMonth(); // 0-indexed
let anoAtual = 2026;
let filtroCategoria = 'todas';

// Charts
let chartCat = null;
let chartDia = null;
let chartAnual = null;

// ========== SUPABASE FETCH ==========
async function supaFetch(table, query = '') {
  const url = `${SUPA_URL}/rest/v1/${table}?${query}`;
  try {
    const res = await fetch(url, {
      headers: {
        'apikey': SUPA_KEY,
        'Authorization': `Bearer ${SUPA_KEY}`,
        'Content-Type': 'application/json'
      }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch (e) {
    console.error(`Erro ao buscar ${table}:`, e);
    return [];
  }
}

// ========== INIT ==========
async function init() {
  // Preencher seletores de mês
  const selectors = [document.getElementById('mesSel'), document.getElementById('mesSel2'), document.getElementById('mesSel3')];
  selectors.forEach(sel => {
    if (!sel) return;
    sel.innerHTML = '';
    MESES.forEach((m, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = m + ' ' + anoAtual;
      if (i === mesAtual) opt.selected = true;
      sel.appendChild(opt);
    });
  });

  // Carregar categorias
  categorias = await supaFetch('categorias_financeiras', 'order=nome.asc');

  // Carregar todos os lançamentos do ano
  lancamentos = await supaFetch('lancamentos', `select=*,categorias_financeiras(nome,cor_hex,tipo)&data_vencimento=gte.${anoAtual}-01-01&data_vencimento=lte.${anoAtual}-12-31&order=data_vencimento.desc`);

  document.getElementById('loadingScreen').classList.add('hide');
  carregarDados();
  carregarAnual();
  carregarFixas();
}

function syncMes(val) {
  mesAtual = parseInt(val);
  document.querySelectorAll('.mes-selector').forEach(s => s.value = mesAtual);
  carregarDados();
}

// ========== FORMATAÇÃO ==========
function fmt(v) {
  return 'R$ ' + Math.abs(Number(v) || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtData(d) {
  if (!d) return '';
  const p = d.split('-');
  return `${p[2]}/${p[1]}`;
}

function getMesLancamentos(mes) {
  const m = String(mes + 1).padStart(2, '0');
  return lancamentos.filter(l => l.data_vencimento && l.data_vencimento.startsWith(`${anoAtual}-${m}`));
}

// ========== DASHBOARD ==========
function carregarDados() {
  const dados = getMesLancamentos(mesAtual);
  const despesas = dados.filter(l => l.tipo === 'despesa');
  const receitas = dados.filter(l => l.tipo === 'receita');
  const fixas = despesas.filter(l => l.recorrente === true);

  const totalDesp = despesas.reduce((s, l) => s + Number(l.valor), 0);
  const totalRec = receitas.reduce((s, l) => s + Number(l.valor), 0);
  const totalFixas = fixas.reduce((s, l) => s + Number(l.valor), 0);
  const saldo = totalRec - totalDesp;

  document.getElementById('kpiRec').textContent = fmt(totalRec);
  document.getElementById('kpiDesp').textContent = fmt(totalDesp);
  document.getElementById('kpiFixas').textContent = fmt(totalFixas);

  const kpiSaldo = document.getElementById('kpiSaldo');
  kpiSaldo.textContent = (saldo >= 0 ? '+' : '-') + ' ' + fmt(saldo);
  kpiSaldo.className = 'kpi-value ' + (saldo >= 0 ? 'pos' : 'neg');

  renderChartCat(despesas);
  renderChartDia(despesas);
  renderUltimos(dados);
  renderLancamentos();
  renderCategorias(despesas, totalDesp);
}

// ========== CHART: CATEGORIAS ==========
function renderChartCat(despesas) {
  const agrup = {};
  despesas.forEach(l => {
    const cat = l.categorias_financeiras ? l.categorias_financeiras.nome : 'Outros';
    const cor = l.categorias_financeiras ? l.categorias_financeiras.cor_hex : '#64748b';
    if (!agrup[cat]) agrup[cat] = { total: 0, cor };
    agrup[cat].total += Number(l.valor);
  });

  const labels = Object.keys(agrup);
  const values = labels.map(k => agrup[k].total);
  const colors = labels.map(k => agrup[k].cor);

  if (chartCat) chartCat.destroy();
  chartCat = new Chart(document.getElementById('chartCat'), {
    type: 'doughnut',
    data: { labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 0 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      cutout: '65%',
      plugins: {
        legend: { position: 'right', labels: { color: '#94a3b8', font: { size: 11 }, boxWidth: 12, padding: 8 } }
      }
    }
  });
}

// ========== CHART: EVOLUÇÃO DIÁRIA ==========
function renderChartDia(despesas) {
  const porDia = {};
  despesas.forEach(l => {
    const dia = l.data_vencimento ? l.data_vencimento.split('-')[2] : '01';
    porDia[dia] = (porDia[dia] || 0) + Number(l.valor);
  });
  const dias = Object.keys(porDia).sort();
  const vals = dias.map(d => porDia[d]);

  if (chartDia) chartDia.destroy();
  chartDia = new Chart(document.getElementById('chartDia'), {
    type: 'bar',
    data: {
      labels: dias.map(d => d + '/' + String(mesAtual + 1).padStart(2, '0')),
      datasets: [{
        data: vals, backgroundColor: 'rgba(248,113,113,.6)',
        borderRadius: 6, borderSkipped: false
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { display: false } },
        y: { ticks: { color: '#64748b', font: { size: 10 }, callback: v => 'R$' + v }, grid: { color: 'rgba(100,116,139,.15)' } }
      }
    }
  });
}

// ========== ÚLTIMOS LANÇAMENTOS ==========
function renderUltimos(dados) {
  const ultimos = dados.slice(0, 8);
  const el = document.getElementById('ultimosTx');

  if (ultimos.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>Nenhum lançamento neste mês</p></div>';
    return;
  }

  el.innerHTML = ultimos.map(l => {
    const cat = l.categorias_financeiras ? l.categorias_financeiras.nome : 'Outros';
    const icon = ICON_CAT[cat] || '💳';
    const isDesp = l.tipo === 'despesa';
    const badge = l.recorrente ? '<span class="tx-badge fixa">📌 FIXA</span>' : '';
    return `<div class="tx-item">
      <div class="tx-icon" style="background:${isDesp ? 'rgba(248,113,113,.15)' : 'rgba(74,222,128,.15)'}">${icon}</div>
      <div class="tx-info">
        <div class="tx-name">${l.descricao}${badge}</div>
        <div class="tx-meta">${fmtData(l.data_vencimento)} · ${cat} · ${l.forma_pagamento || ''}</div>
      </div>
      <div class="tx-valor ${isDesp ? 'desp' : 'rec'}">${isDesp ? '-' : '+'}${fmt(l.valor)}</div>
    </div>`;
  }).join('');
}

// ========== LANÇAMENTOS (LISTA COMPLETA) ==========
function renderLancamentos() {
  const dados = getMesLancamentos(mesAtual);
  const search = (document.getElementById('searchLanc')?.value || '').toLowerCase();

  // Filtros
  const catsUsadas = [...new Set(dados.map(l => l.categorias_financeiras ? l.categorias_financeiras.nome : 'Outros'))].sort();
  const filterBar = document.getElementById('filterBar');
  filterBar.innerHTML = `<button class="filter-btn ${filtroCategoria === 'todas' ? 'active' : ''}" onclick="setFiltro('todas')">Todas</button>` +
    catsUsadas.map(c => `<button class="filter-btn ${filtroCategoria === c ? 'active' : ''}" onclick="setFiltro('${c}')">${c}</button>`).join('');

  let filtrados = dados;
  if (filtroCategoria !== 'todas') {
    filtrados = filtrados.filter(l => (l.categorias_financeiras ? l.categorias_financeiras.nome : 'Outros') === filtroCategoria);
  }
  if (search) {
    filtrados = filtrados.filter(l => l.descricao.toLowerCase().includes(search) || (l.favorecido_pagador || '').toLowerCase().includes(search));
  }

  const el = document.getElementById('listLanc');
  if (filtrados.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>Nenhum lançamento encontrado</p></div>';
    return;
  }

  el.innerHTML = filtrados.map(l => {
    const cat = l.categorias_financeiras ? l.categorias_financeiras.nome : 'Outros';
    const icon = ICON_CAT[cat] || '💳';
    const isDesp = l.tipo === 'despesa';
    const badge = l.recorrente ? '<span class="tx-badge fixa">📌</span>' : '';
    return `<div class="tx-item">
      <div class="tx-icon" style="background:${isDesp ? 'rgba(248,113,113,.15)' : 'rgba(74,222,128,.15)'}">${icon}</div>
      <div class="tx-info">
        <div class="tx-name">${l.descricao}${badge}</div>
        <div class="tx-meta">${fmtData(l.data_vencimento)} · ${cat} · ${l.forma_pagamento || ''} · ${l.status || ''}</div>
      </div>
      <div class="tx-valor ${isDesp ? 'desp' : 'rec'}">${isDesp ? '-' : '+'}${fmt(l.valor)}</div>
    </div>`;
  }).join('');
}

function setFiltro(cat) {
  filtroCategoria = cat;
  renderLancamentos();
}

// ========== FIXAS ==========
function carregarFixas() {
  // Pegar todas as despesas fixas (recorrente = true) únicas por descrição
  const fixas = lancamentos.filter(l => l.recorrente === true && l.tipo === 'despesa');

  // Agrupar por descrição para evitar duplicatas (pega o mais recente)
  const agrup = {};
  fixas.forEach(l => {
    const key = l.descricao;
    if (!agrup[key] || l.data_vencimento > agrup[key].data_vencimento) {
      agrup[key] = l;
    }
  });

  const lista = Object.values(agrup).sort((a, b) => Number(b.valor) - Number(a.valor));
  const total = lista.reduce((s, l) => s + Number(l.valor), 0);

  document.getElementById('kpiFixasTotal').textContent = fmt(total);

  const el = document.getElementById('listFixas');
  if (lista.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="icon">📌</div><p>Nenhuma despesa fixa cadastrada</p></div>';
    return;
  }

  el.innerHTML = lista.map(l => {
    const cat = l.categorias_financeiras ? l.categorias_financeiras.nome : 'Outros';
    const pago = (l.status || '').toLowerCase() === 'pago';
    return `<div class="fixa-item">
      <div class="fixa-left">
        <div class="fixa-status ${pago ? 'pago' : 'pendente'}"></div>
        <div>
          <div class="fixa-name">${l.descricao}</div>
          <div class="fixa-cat">${cat} · ${pago ? '✅ Pago' : '⏳ Pendente'}</div>
        </div>
      </div>
      <div class="fixa-valor">${fmt(l.valor)}</div>
    </div>`;
  }).join('');
}

// ========== CATEGORIAS ==========
function renderCategorias(despesas, totalDesp) {
  const agrup = {};
  despesas.forEach(l => {
    const cat = l.categorias_financeiras ? l.categorias_financeiras.nome : 'Outros';
    const cor = l.categorias_financeiras ? l.categorias_financeiras.cor_hex : '#64748b';
    if (!agrup[cat]) agrup[cat] = { total: 0, cor, qtd: 0 };
    agrup[cat].total += Number(l.valor);
    agrup[cat].qtd++;
  });

  const sorted = Object.entries(agrup).sort((a, b) => b[1].total - a[1].total);

  const el = document.getElementById('listCat');
  if (sorted.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="icon">🏷️</div><p>Sem categorias neste mês</p></div>';
    return;
  }

  const maxVal = sorted[0][1].total;
  el.innerHTML = '<div class="section-title"><span>🏷️</span> Ranking por Categoria</div>' +
    sorted.map(([nome, d]) => {
      const pct = totalDesp > 0 ? ((d.total / totalDesp) * 100).toFixed(1) : 0;
      const barW = maxVal > 0 ? ((d.total / maxVal) * 100) : 0;
      const icon = ICON_CAT[nome] || '💳';
      return `<div class="cat-item">
        <div class="cat-header">
          <div class="cat-name"><div class="cat-dot" style="background:${d.cor}"></div>${icon} ${nome} (${d.qtd})</div>
          <div class="cat-valor" style="color:${d.cor}">${fmt(d.total)}</div>
        </div>
        <div class="cat-bar"><div class="cat-bar-fill" style="width:${barW}%;background:${d.cor}"></div></div>
        <div class="cat-pct">${pct}% do total</div>
      </div>`;
    }).join('');
}

// ========== ANUAL ==========
function carregarAnual() {
  const meses = [];
  for (let m = 0; m < 12; m++) {
    const dados = getMesLancamentos(m);
    const desp = dados.filter(l => l.tipo === 'despesa').reduce((s, l) => s + Number(l.valor), 0);
    const rec = dados.filter(l => l.tipo === 'receita').reduce((s, l) => s + Number(l.valor), 0);
    meses.push({ nome: MESES[m].substring(0, 3), desp, rec, saldo: rec - desp });
  }

  // Grid
  document.getElementById('gridAnual').innerHTML = meses.map((m, i) => {
    const saldoCor = m.saldo >= 0 ? 'color:var(--green)' : 'color:var(--red)';
    const active = i === mesAtual ? 'active' : '';
    return `<div class="month-card ${active}" onclick="syncMes(${i});navTo('pageDash',document.querySelector('.nav-item'))">
      <div class="month-label">${m.nome}</div>
      <div class="month-desp">-${fmt(m.desp)}</div>
      <div class="month-rec">+${fmt(m.rec)}</div>
      <div class="month-saldo" style="${saldoCor}">${m.saldo >= 0 ? '+' : ''}${fmt(m.saldo)}</div>
    </div>`;
  }).join('');

  // Chart
  const labels = meses.map(m => m.nome);
  const despData = meses.map(m => m.desp);
  const recData = meses.map(m => m.rec);

  if (chartAnual) chartAnual.destroy();
  chartAnual = new Chart(document.getElementById('chartAnual'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Receitas', data: recData, backgroundColor: 'rgba(74,222,128,.7)', borderRadius: 6 },
        { label: 'Despesas', data: despData, backgroundColor: 'rgba(248,113,113,.7)', borderRadius: 6 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#94a3b8', font: { size: 11 } } } },
      scales: {
        x: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { display: false } },
        y: { ticks: { color: '#64748b', font: { size: 10 }, callback: v => 'R$' + v }, grid: { color: 'rgba(100,116,139,.15)' } }
      }
    }
  });
}

// ========== NAVEGAÇÃO ==========
function navTo(pageId, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

// ========== START ==========
init();
</script>
</body>
</html>
