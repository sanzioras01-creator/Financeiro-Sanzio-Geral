<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Financeiro Pro</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
</head>
<body class="bg-[#09090f] text-[#f4f0eb] font-['Syne'] overflow-hidden">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;
    
    // Proteção contra carregamento lento da biblioteca de gráficos
    const Recharts = window.Recharts || {};
    const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, PieChart, Pie, Cell, LineChart, Line, CartesianGrid } = Recharts;

    /* ─── CREDENCIAIS SUPABASE ──────────────────────────────── */
    const SUPABASE_URL = 'https://wqajkohquvoukljpkqet.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndxYWprb2hxdXZvdWtsanBrcWV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzIzNjIsImV4cCI6MjA4ODE0ODM2Mn0.-GsT75uLNZJJuFErpYjvOZ0lNJWlrg2qHpNUhGqUgus';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    /* ─── CONSTANTES DA UI ──────────────────────────────────── */
    const MONTHS = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
    const MONTH_SHORT = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

    const CATS_PESSOAL = ["Moradia","Financiamento","Mercado","Transporte/Gasolina","Vestuário","Assinaturas","Saúde e Beleza","Despesas eventuais","Autoaperfeiçoamento","Lazer","Outros"];
    const CATS_EMPRESA = ["Folha de Pagamento","Fornecedores","Marketing/Publicidade","Impostos/Taxas (Empresa)","Aluguel Comercial","Despesas Empresariais"];
    const ALL_CATS = [...CATS_PESSOAL, ...CATS_EMPRESA];
    const TIPOS = ["Cartão 01","Cartão 02","Pix","Débito/Boleto","Dinheiro"];

    const CAT_COLORS = {
      "Moradia":"#6366f1","Financiamento":"#8b5cf6","Mercado":"#ec4899","Transporte/Gasolina":"#f59e0b",
      "Vestuário":"#10b981","Assinaturas":"#3b82f6","Saúde e Beleza":"#f472b6","Despesas eventuais":"#ef4444",
      "Autoaperfeiçoamento":"#14b8a6","Lazer":"#a855f7","Outros":"#64748b",
      "Folha de Pagamento":"#22c55e","Fornecedores":"#16a34a","Marketing/Publicidade":"#15803d",
      "Impostos/Taxas (Empresa)":"#166534","Aluguel Comercial":"#052e16","Despesas Empresariais":"#4ade80",
    };

    const NAV_ITEMS = [
      { id:"dashboard", icon:"▦", label:"Dashboard" },
      { id:"lancamentos", icon:"↕", label:"Lançamentos" },
      { id:"receitas", icon:"↑", label:"Receitas" },
      { id:"categorias", icon:"◎", label:"Categorias" },
      { id:"anual", icon:"⊞", label:"Anual" },
    ];

    const fmt = (v) => "R$ " + Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});
    const now = new Date();
    const CURRENT_YEAR = now.getFullYear();
    const CURRENT_MONTH_IDX = now.getMonth();

    /* ─── APP PRINCIPAL ─────────────────────────────────────── */
    function App() {
      const [lancamentos, setLancamentos] = useState([]);
      const [categorias, setCategorias] = useState([]);
      const [contas, setContas] = useState([]);
      
      const [view, setView] = useState("dashboard");
      const [monthIdx, setMonthIdx] = useState(CURRENT_MONTH_IDX);
      const [filtroContaId, setFiltroContaId] = useState("Todas");
      
      const [loading, setLoading] = useState(true);
      const [erro, setErro] = useState(null);
      const [scanOpen, setScanOpen] = useState(false);

      useEffect(() => {
        let isMounted = true;
        async function boot() {
          try {
            let { data: dbContas, error: errContas } = await supabase.from('contas_bancarias').select('*');
            if (errContas) throw new Error("Erro ao ler contas: " + errContas.message);
            if (!dbContas || dbContas.length === 0) {
              const { data: newConta } = await supabase.from('contas_bancarias').insert([{ nome: 'Conta Principal', tipo: 'Pessoal' }]).select();
              dbContas = newConta || [];
            }
            if(isMounted) setContas(dbContas);

            let { data: dbCats, error: errCats } = await supabase.from('categorias_financeiras').select('*');
            if (errCats) throw new Error("Erro ao ler categorias: " + errCats.message);
            if (!dbCats || dbCats.length === 0) {
              const inserts = ALL_CATS.map(c => ({ nome: c, tipo: CATS_PESSOAL.includes(c) ? 'Pessoal' : 'Empresarial', cor_hex: CAT_COLORS[c] || '#64748b' }));
              await supabase.from('categorias_financeiras').insert(inserts);
              const { data: freshCats } = await supabase.from('categorias_financeiras').select('*');
              dbCats = freshCats || [];
            }
            if(isMounted) setCategorias(dbCats);

            const { data: dbLancamentos, error: errLanc } = await supabase.from('lancamentos').select('*, categorias_financeiras(nome), contas_bancarias(nome)');
            if (errLanc) throw new Error("Erro ao ler lançamentos: " + errLanc.message);
            
            if(isMounted) { setLancamentos(dbLancamentos || []); setLoading(false); }
          } catch (e) {
            console.error(e);
            if(isMounted) { setErro(e.message); setLoading(false); }
          }
        }
        boot();
        return () => { isMounted = false; };
      }, []);

      if (erro) return (
        <div className="flex items-center justify-center h-screen flex-col gap-4 p-5 text-center">
          <div className="text-4xl">⚠️</div>
          <div className="text-xl font-bold text-red-400">Ops! Ocorreu um erro no aplicativo.</div>
          <div className="text-sm text-white/60 bg-red-500/10 p-4 rounded-lg max-w-lg break-all">{erro}</div>
          <button onClick={() => window.location.reload()} className="bg-gradient-to-r from-indigo-500 to-purple-500 rounded-xl text-white px-6 py-3 text-sm font-bold mt-4">Tentar Novamente</button>
        </div>
      );

      if (loading) return (
        <div className="flex items-center justify-center h-screen flex-col gap-4">
          <div className="text-4xl animate-pulse">🔄</div>
          <div className="text-sm text-white/40">Sincronizando com Supabase...</div>
        </div>
      );

      // Processamento de Dados
      const currentFiltered = lancamentos.filter(l => {
        if (!l.data_vencimento) return false;
        const lDate = new Date(l.data_vencimento + 'T00:00:00');
        return lDate.getMonth() === monthIdx && lDate.getFullYear() === CURRENT_YEAR && (filtroContaId === "Todas" || l.conta_id === filtroContaId);
      });

      const monthTxs = currentFiltered.filter(l => l.tipo === 'Despesa').map(l => ({
        ...l, nome: l.descricao, data: parseInt(l.data_vencimento.split('-')[2]), tipo: l.forma_pagamento, categoria: l.categorias_financeiras?.nome || 'Outros', pago: l.status === 'Pago'
      }));

      const monthRecs = currentFiltered.filter(l => l.tipo === 'Receita').map(l => ({
        ...l, nome: l.descricao, data: parseInt(l.data_vencimento.split('-')[2])
      }));

      const totalDesp = monthTxs.reduce((s, t) => s + Number(t.valor || 0), 0);
      const totalRec = monthRecs.reduce((s, r) => s + Number(r.valor || 0), 0);
      const saldo = totalRec - totalDesp;

      // Estilos genéricos p/ inputs
      const inpClass = "bg-white/5 border border-white/10 rounded-md text-[#f4f0eb] p-2 text-xs md:text-sm font-['Syne'] w-full focus:border-indigo-400 focus:outline-none";

      return (
        <div className="flex flex-col md:flex-row h-screen">
          
          {/* ── SIDEBAR (DESKTOP) ── */}
          <div className="hidden md:flex flex-col w-64 bg-[#0d0d18] border-r border-white/5 p-6 sticky top-0 h-screen shrink-0">
            <div className="pb-5 border-b border-white/5 mb-4"><div className="text-2xl font-extrabold tracking-tight">💼 Financeiro</div></div>
            <div className="pb-4 mb-3 border-b border-white/5">
              <div className="text-[10px] text-white/40 mb-1.5 uppercase tracking-widest font-['JetBrains_Mono']">Filtrar Conta</div>
              <select value={filtroContaId} onChange={e => setFiltroContaId(e.target.value)} className={inpClass}>
                <option value="Todas" className="bg-[#0d0d18]">Todas as Contas</option>
                {contas.map(c => <option key={c.id} value={c.id} className="bg-[#0d0d18]">{c.nome}</option>)}
              </select>
            </div>
            {NAV_ITEMS.map(n => (
              <div key={n.id} onClick={() => setView(n.id)} className={`flex items-center gap-3 p-3 rounded-xl mb-1 cursor-pointer transition-colors text-sm font-semibold ${view===n.id ? 'bg-indigo-500/20 text-indigo-400' : 'text-white/50 hover:bg-white/5'}`}>
                <span className="font-mono text-lg">{n.icon}</span> {n.label}
              </div>
            ))}
            <div className="flex-1"/>
            <div className="pt-3 border-t border-white/5">
              <div className="text-[10px] text-white/40 mb-1.5 uppercase tracking-widest font-['JetBrains_Mono']">Mês Ativo</div>
              <select value={monthIdx} onChange={e => setMonthIdx(Number(e.target.value))} className={inpClass}>
                {MONTHS.map((m,i) => <option key={m} value={i} className="bg-[#0d0d18]">{m}</option>)}
              </select>
            </div>
            <button onClick={() => setScanOpen(true)} className="mt-3 bg-gradient-to-r from-indigo-500 to-purple-500 rounded-xl text-white p-3 text-sm font-bold flex items-center justify-center gap-2 hover:brightness-110 transition-all">📸 Scan IA</button>
          </div>

          {/* ── TOPBAR (MOBILE) ── */}
          <div className="md:hidden flex flex-col gap-3 p-4 bg-[#0d0d18] border-b border-white/5 sticky top-0 z-40 shrink-0">
            <div className="flex justify-between items-center">
              <div className="text-xl font-extrabold tracking-tight">💼 Financeiro</div>
              <button onClick={() => setScanOpen(true)} className="bg-gradient-to-r from-indigo-500 to-purple-500 rounded-lg text-white px-3 py-1.5 text-xs font-bold">📸 Scan IA</button>
            </div>
            <div className="flex gap-2">
              <select value={filtroContaId} onChange={e => setFiltroContaId(e.target.value)} className={inpClass}>
                <option value="Todas" className="bg-[#0d0d18]">Todas as Contas</option>
                {contas.map(c => <option key={c.id} value={c.id} className="bg-[#0d0d18]">{c.nome}</option>)}
              </select>
              <select value={monthIdx} onChange={e => setMonthIdx(Number(e.target.value))} className={inpClass}>
                {MONTHS.map((m,i) => <option key={m} value={i} className="bg-[#0d0d18]">{m}</option>)}
              </select>
            </div>
          </div>

          {/* ── MAIN CONTENT ── */}
          <div className="flex-1 overflow-y-auto pb-24 md:pb-0 animate-[fadeIn_0.3s_ease]">
            <div className="hidden md:flex p-6 md:px-8 border-b border-white/5 items-center justify-between sticky top-0 bg-[#09090f]/90 backdrop-blur-md z-10">
              <div>
                <div className="text-2xl font-extrabold tracking-tight">{NAV_ITEMS.find(n=>n.id===view)?.label || 'App'}</div>
                <div className="text-xs text-white/30 mt-1 font-['JetBrains_Mono']">{MONTHS[monthIdx]} {CURRENT_YEAR}</div>
              </div>
              <div className="flex gap-3">
                <StatPill label="Receitas" value={fmt(totalRec)} color="#22c55e"/>
                <StatPill label="Despesas" value={fmt(totalDesp)} color="#f87171"/>
                <StatPill label="Saldo" value={fmt(saldo)} color={saldo>=0?"#22c55e":"#f87171"}/>
              </div>
            </div>

            {/* Mobile Header Title (Shows inside content on mobile) */}
            <div className="md:hidden px-4 pt-6 pb-2">
              <div className="text-2xl font-extrabold">{NAV_ITEMS.find(n=>n.id===view)?.label || 'App'}</div>
              <div className="flex gap-2 mt-4 overflow-x-auto pb-2">
                <StatPill label="Rec" value={fmt(totalRec)} color="#22c55e"/>
                <StatPill label="Desp" value={fmt(totalDesp)} color="#f87171"/>
                <StatPill label="Saldo" value={fmt(saldo)} color={saldo>=0?"#22c55e":"#f87171"}/>
              </div>
            </div>

            <div className="p-4 md:p-8">
              {view==="dashboard" && <Dashboard monthTxs={monthTxs} monthRecs={monthRecs} totalDesp={totalDesp} totalRec={totalRec} saldo={saldo} />}
              {view==="lancamentos" && <Lancamentos txs={monthTxs} inpClass={inpClass} />}
              {view==="receitas" && <Receitas recs={monthRecs} inpClass={inpClass} />}
              {view==="categorias" && <Categorias txs={monthTxs} totalDesp={totalDesp}/>}
              {view==="anual" && <Anual lancamentos={lancamentos} />}
            </div>
          </div>

          {/* ── BOTTOM NAV (MOBILE) ── */}
          <div className="md:hidden fixed bottom-0 left-0 w-full bg-[#0d0d18] border-t border-white/5 flex justify-around items-center p-2 z-50 pb-safe">
            {NAV_ITEMS.map(n => (
              <div key={n.id} onClick={() => setView(n.id)} className={`flex flex-col items-center p-2 rounded-xl transition-colors ${view===n.id ? 'text-indigo-400' : 'text-white/40'}`}>
                <span className="font-mono text-xl mb-1">{n.icon}</span>
                <span className="text-[10px] font-semibold">{n.label.split(' ')[0]}</span>
              </div>
            ))}
          </div>

          {scanOpen && <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4"><div className="bg-[#0f0f1a] border border-white/10 rounded-2xl p-8 text-center text-white max-w-sm w-full"><div className="text-5xl mb-4">📱</div><h2 className="text-xl font-bold mb-2">Mande a foto pelo Chat!</h2><p className="text-white/60 mb-6 text-sm">Como combinamos, envie a foto do comprovante para mim (IA) no chat, e eu injeto direto no Supabase para aparecer aqui automaticamente.</p><button onClick={() => setScanOpen(false)} className="bg-white/10 border border-white/10 rounded-xl text-white px-6 py-2 w-full font-semibold">Fechar</button></div></div>}
        </div>
      );
    }

    /* ─── COMPONENTES SECUNDÁRIOS ────────────────────────────── */
    function StatPill({ label, value, color }) {
      return (
        <div className="bg-white/5 border border-white/10 rounded-xl p-2 md:px-4 md:py-2 text-center flex-1 md:flex-none min-w-[90px]">
          <div className="text-[9px] md:text-[10px] text-white/40 uppercase tracking-widest font-['JetBrains_Mono']">{label}</div>
          <div className="text-xs md:text-sm font-bold mt-1" style={{color}}>{value}</div>
        </div>
      );
    }

    function Dashboard({ monthTxs, monthRecs, totalDesp, totalRec, saldo }) {
      const catTotals = ALL_CATS.map(c => ({ name:c, valor: monthTxs.filter(t=>t.categoria===c).reduce((s,t)=>s+Number(t.valor||0),0) })).filter(c=>c.valor>0).sort((a,b)=>b.valor-a.valor);
      const tipoPieData = TIPOS.map(tp => ({ name:tp, valor: monthTxs.filter(t=>t.tipo===tp).reduce((s,t)=>s+Number(t.valor||0),0) })).filter(t=>t.valor>0);
      const TIPO_COLORS = ["#6366f1","#a855f7","#ec4899","#f59e0b","#22c55e"];
      const CanRenderCharts = typeof BarChart !== 'undefined';

      return (
        <div className="flex flex-col gap-4 md:gap-6">
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4">
            {[
              { label:"Despesas", value:fmt(totalDesp), sub:`${monthTxs.length} lanç.`, color:"#f87171", icon:"💸" },
              { label:"Receitas", value:fmt(totalRec), sub:`${monthRecs.length} ent.`, color:"#22c55e", icon:"💵" },
              { label:"Saldo", value:fmt(saldo), sub: saldo>=0?"Positivo 🎉":"Atenção ⚠️", color:saldo>=0?"#22c55e":"#f87171", icon:"⚖️" },
              { label:"Maior Gasto", value: catTotals[0] ? fmt(catTotals[0].valor) : "R$ 0", sub:catTotals[0]?.name?.substring(0,12)||"—", color:"#a855f7", icon:"📊" },
            ].map(k => (
              <div key={k.label} className="bg-white/5 border border-white/10 rounded-2xl p-4 transition-transform hover:-translate-y-1">
                <div className="text-xl md:text-2xl mb-2">{k.icon}</div>
                <div className="text-[9px] md:text-[11px] text-white/40 uppercase tracking-widest font-['JetBrains_Mono'] mb-1">{k.label}</div>
                <div className="text-sm md:text-lg font-extrabold" style={{color:k.color}}>{k.value}</div>
                <div className="text-[10px] text-white/40 mt-1 truncate">{k.sub}</div>
              </div>
            ))}
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 md:gap-6">
            <div className="lg:col-span-2 bg-white/5 border border-white/10 rounded-2xl p-4 md:p-6">
              <div className="text-sm font-bold text-white/60 mb-4">Gastos por Categoria</div>
              {catTotals.length > 0 && CanRenderCharts ? (
                <div className="h-52 w-full">
                  <ResponsiveContainer width="100%" height="100%">
                    <BarChart data={catTotals.slice(0,8)} layout="vertical" margin={{left:0,right:20}}>
                      <XAxis type="number" hide/>
                      <YAxis type="category" dataKey="name" width={110} tick={{ fill:"rgba(255,255,255,0.5)", fontSize:10 }}/>
                      <Tooltip formatter={v=>fmt(v)} contentStyle={{ background:"#1a1a2e", border:"1px solid rgba(255,255,255,0.1)", borderRadius:8 }} labelStyle={{ color:"#fff" }}/>
                      <Bar dataKey="valor" radius={[0,6,6,0]}>
                        {catTotals.slice(0,8).map((e,i) => <Cell key={i} fill={CAT_COLORS[e.name]||"#6366f1"}/>)}
                      </Bar>
                    </BarChart>
                  </ResponsiveContainer>
                </div>
              ) : <Empty text="Sem lançamentos"/>}
            </div>

            <div className="bg-white/5 border border-white/10 rounded-2xl p-4 md:p-6">
              <div className="text-sm font-bold text-white/60 mb-4">Por Pagamento</div>
              {tipoPieData.length > 0 && CanRenderCharts ? (<>
                <div className="h-36 w-full">
                  <ResponsiveContainer width="100%" height="100%">
                    <PieChart>
                      <Pie data={tipoPieData} dataKey="valor" nameKey="name" cx="50%" cy="50%" innerRadius={40} outerRadius={60}>
                        {tipoPieData.map((e,i) => <Cell key={i} fill={TIPO_COLORS[i%TIPO_COLORS.length]}/>)}
                      </Pie>
                      <Tooltip formatter={v=>fmt(v)} contentStyle={{ background:"#1a1a2e", border:"1px solid rgba(255,255,255,0.1)", borderRadius:8 }}/>
                    </PieChart>
                  </ResponsiveContainer>
                </div>
                <div className="flex flex-wrap gap-2 mt-4 justify-center">
                  {tipoPieData.map((t,i) => (
                    <div key={t.name} className="flex items-center gap-1.5 text-[10px] text-white/50 bg-white/5 px-2 py-1 rounded-md">
                      <div className="w-2 h-2 rounded-full" style={{background:TIPO_COLORS[i%TIPO_COLORS.length]}}/>{t.name}
                    </div>
                  ))}
                </div>
              </>) : <Empty text="Sem dados"/>}
            </div>
          </div>
        </div>
      );
    }

    function Lancamentos({ txs, inpClass }) {
      return (
        <div className="flex flex-col gap-4">
          <div className="overflow-x-auto pb-4">
            <div className="min-w-[650px] md:min-w-0">
              <div className="grid grid-cols-[2fr_50px_50px_90px_1fr_90px] gap-2 p-2 px-3 text-[10px] text-white/30 uppercase tracking-widest font-['JetBrains_Mono'] border-b border-white/5 mb-2">
                <span>Nome</span><span className="text-center">Pago</span><span className="text-center">Dia</span><span>Tipo</span><span>Categoria</span><span className="text-right">Valor</span>
              </div>
              {txs.length===0 ? <Empty text="Nenhum lançamento no mês"/> : txs.sort((a,b)=>Number(b.data)-Number(a.data)).map(t => (
                <div key={t.id} className="grid grid-cols-[2fr_50px_50px_90px_1fr_90px] gap-2 p-3 bg-white/5 border border-white/5 rounded-xl items-center mb-2 hover:bg-white/10 transition-colors">
                  <div className="text-xs md:text-sm font-semibold truncate">{t.nome}</div>
                  <div className="text-center text-xs">{t.pago?"✅":"⏳"}</div>
                  <div className="text-xs text-white/50 text-center font-['JetBrains_Mono']">{t.data}</div>
                  <div className="text-[10px] md:text-xs bg-white/10 rounded-md px-2 py-1 text-center truncate">{t.tipo}</div>
                  <div className="flex items-center gap-2 truncate">
                    <div className="w-2 h-2 rounded-full shrink-0" style={{background:CAT_COLORS[t.categoria]||"#64748b"}}/>
                    <span className="text-[10px] md:text-xs truncate">{t.categoria}</span>
                  </div>
                  <div className="text-xs md:text-sm font-bold text-red-400 text-right font-['JetBrains_Mono']">{fmt(t.valor)}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function Receitas({ recs, inpClass }) {
      return (
        <div className="flex flex-col gap-4">
          {recs.length===0 ? <Empty text="Nenhuma receita no mês"/> : recs.sort((a,b)=>Number(b.data)-Number(a.data)).map(r => (
            <div key={r.id} className="flex items-center gap-3 md:gap-4 p-3 md:p-4 bg-white/5 border border-white/5 rounded-xl">
              <div className="w-10 h-10 rounded-full bg-green-500/20 flex items-center justify-center text-lg shrink-0">💵</div>
              <div className="flex-1 min-w-0">
                <div className="text-sm md:text-base font-bold truncate">{r.nome}</div>
                <div className="text-xs text-white/40">Dia {r.data}</div>
              </div>
              <div className="text-base md:text-lg font-extrabold text-green-400 font-['JetBrains_Mono']">{fmt(r.valor)}</div>
            </div>
          ))}
        </div>
      );
    }

    function Categorias({ txs, totalDesp }) {
      const catData = ALL_CATS.map(c => {
        const catTxs = txs.filter(t=>t.categoria===c);
        const valor = catTxs.reduce((s,t)=>s+Number(t.valor||0),0);
        return { cat:c, valor, count:catTxs.length, pct: totalDesp>0 ? (valor/totalDesp*100).toFixed(1) : 0 };
      }).filter(c=>c.valor>0).sort((a,b)=>b.valor-a.valor);

      return (
        <div className="flex flex-col gap-3 md:gap-4">
          {catData.length === 0 ? <Empty text="Aguardando lançamentos..."/> : catData.map(c => (
            <div key={c.cat} className="bg-white/5 border border-white/5 rounded-xl p-4 md:p-5">
              <div className="flex justify-between mb-3 items-center">
                <div className="flex items-center gap-2 md:gap-3">
                  <div className="w-3 h-3 rounded-sm shrink-0" style={{background:CAT_COLORS[c.cat]||"#64748b"}}/>
                  <div className="text-sm md:text-base font-bold truncate max-w-[150px] md:max-w-none">{c.cat}</div>
                </div>
                <div className="flex items-center gap-3 md:gap-4">
                  <span className="text-[10px] md:text-xs text-white/40">{c.pct}%</span>
                  <span className="text-sm md:text-lg font-bold text-red-400 font-['JetBrains_Mono']">{fmt(c.valor)}</span>
                </div>
              </div>
              <div className="bg-white/10 rounded-full h-1.5 md:h-2 w-full overflow-hidden">
                <div className="h-full rounded-full transition-all duration-500" style={{width:`${c.pct}%`, background:CAT_COLORS[c.cat]||"#6366f1"}}/>
              </div>
            </div>
          ))}
        </div>
      );
    }

    function Anual({ lancamentos }) {
      const CanRenderCharts = typeof window.Recharts !== 'undefined' && window.Recharts.BarChart;
      const monthSums = MONTHS.map((m,i) => {
        const desp = lancamentos.filter(l => l.data_vencimento && l.tipo==='Despesa' && new Date(l.data_vencimento+'T00:00:00').getMonth() === i).reduce((s,t)=>s+Number(t.valor),0);
        const rec = lancamentos.filter(l => l.data_vencimento && l.tipo==='Receita' && new Date(l.data_vencimento+'T00:00:00').getMonth() === i).reduce((s,t)=>s+Number(t.valor),0);
        return { mes: MONTH_SHORT[i], desp, rec, saldo: rec-desp };
      });

      return (
        <div className="bg-white/5 border border-white/10 rounded-2xl p-4 md:p-6 overflow-x-auto">
          <div className="text-sm font-bold text-white/60 mb-6">Resumo Anual ({CURRENT_YEAR})</div>
          <div className="min-w-[500px]">
            {CanRenderCharts ? (
              <div className="h-64 w-full">
                <ResponsiveContainer width="100%" height="100%">
                  <BarChart data={monthSums}>
                    <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.05)"/>
                    <XAxis dataKey="mes" tick={{ fill:"rgba(255,255,255,0.4)", fontSize:10 }}/>
                    <YAxis tick={{ fill:"rgba(255,255,255,0.4)", fontSize:10 }}/>
                    <Tooltip formatter={v=>fmt(v)} contentStyle={{ background:"#1a1a2e", borderRadius:8, border:"none" }}/>
                    <Bar dataKey="rec" name="Receitas" fill="#22c55e" radius={[4,4,0,0]}/>
                    <Bar dataKey="desp" name="Despesas" fill="#f87171" radius={[4,4,0,0]}/>
                  </BarChart>
                </ResponsiveContainer>
              </div>
            ) : <Empty text="Carregando gráficos..."/>}
          </div>
        </div>
      );
    }

    function Empty({ text }) {
      return <div className="text-center p-8 text-white/20"><div className="text-4xl mb-2">📭</div><div className="text-xs md:text-sm">{text}</div></div>;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
